<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Outfit',sans-serif; background:#F9FAFB; color:#1F2937; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; }
.container { max-width:480px; }
.code { font-size:6rem; font-weight:800; color:#059669; line-height:1; margin-bottom:8px; }
h1 { font-size:1.5rem; font-weight:700; margin-bottom:12px; color:#111827; }
p { font-size:1rem; color:#6B7280; line-height:1.6; margin-bottom:32px; }
.btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.btn { display:inline-flex; align-items:center; padding:12px 24px; border-radius:10px; font-family:'Outfit',sans-serif; font-size:.95rem; font-weight:600; text-decoration:none; transition:all .2s; }
.btn-green { background:#059669; color:#fff; }
.btn-green:hover { background:#047857; }
.btn-ghost { border:1.5px solid #D1D5DB; color:#374151; background:#fff; }
.btn-ghost:hover { border-color:#059669; color:#059669; }
</style>
<script async src="shared/error-tracker.js?v=a6f6c956"></script><style id="exo-loading-css">
#exo-loading{position:fixed;inset:0;z-index:999999;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;font-family:'Outfit','DM Sans',-apple-system,system-ui,sans-serif;color:#065F46;transition:opacity .25s ease}
#exo-loading.hide{opacity:0;pointer-events:none}
#exo-loading .exo-spin{width:36px;height:36px;border:3px solid #D1FAE5;border-top-color:#059669;border-radius:50%;animation:exo-rot .8s linear infinite}
#exo-loading .exo-txt{font-size:.92rem;font-weight:500;letter-spacing:.01em;color:#475569}
@keyframes exo-rot{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){#exo-loading .exo-spin{animation:none;border-top-color:#059669}}
</style><script id="exo-loading-js">
(function(){
  if(document.getElementById('exo-loading'))return;
  var d=document.createElement('div');
  d.id='exo-loading';
  d.setAttribute('aria-live','polite');
  d.innerHTML='<div class="exo-spin" aria-hidden="true"></div><div class="exo-txt">Cargando…</div>';
  // Insertar al inicio del body en cuanto exista
  function inject(){
    if(!document.body){setTimeout(inject,10);return}
    if(!document.getElementById('exo-loading'))document.body.insertBefore(d,document.body.firstChild);
  }
  inject();
  function hide(){
    var el=document.getElementById('exo-loading');
    if(!el)return;
    el.classList.add('hide');
    setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},350);
  }
  if(document.readyState==='complete'||document.readyState==='interactive'){
    setTimeout(hide,30);
  }else{
    document.addEventListener('DOMContentLoaded',function(){setTimeout(hide,30)});
  }
  // Failsafe: nunca dejar el overlay más de 4s
  setTimeout(hide,4000);
})();
</script></head>
<body>

  <div class="btns">
    <a href="/" class="btn btn-green">Ir al inicio</a>
    <a href="/exogena.html" class="btn btn-ghost">Abrir Exógena</a>
  </div>
</div>
