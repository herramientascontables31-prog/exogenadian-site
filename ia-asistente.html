<style>
/* ═══ CSS Variables ═══ */
:root {
  --bg: #0F0B1A;
  --bg-card: #1A1425;
  --bg-card-hover: #221A30;
  --bg-input: #150F22;
  --border: rgba(5, 150, 105, 0.15);
  --border-light: rgba(5, 150, 105, 0.08);
  --purple: #059669;
  --purple-dim: rgba(5, 150, 105, 0.15);
  --purple-glow: rgba(5, 150, 105, 0.3);
  --violet: #34D399;
  --violet-dim: rgba(52, 211, 153, 0.12);
  --text: #E8E0F0;
  --text-dim: #9B8FB8;
  --text-muted: #6B5F80;
  --white: #FEFCFF;
  --red: #EF4444;
  --red-dim: rgba(239, 68, 68, 0.12);
  --green: #22C55E;
  --amber: #F59E0B;
  --r: 14px;
}
/* ═══ Reset ═══ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
}
/* ═══ Header ═══ */
.chat-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  background: rgba(15, 11, 26, 0.95);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}
.chat-header .back-link {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-dim);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 500;
  transition: color 0.2s;
  flex-shrink: 0;
}
.chat-header .back-link:hover { color: var(--purple); }
.chat-header .back-link svg { width: 18px; height: 18px; }
.header-divider {
  width: 1px;
  height: 24px;
  background: var(--border);
  flex-shrink: 0;
}
.header-title {
  font-family: 'Outfit', sans-serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--white);
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-title .icon-ai {
  width: 22px; height: 22px;
  background: linear-gradient(135deg, var(--purple), #34D399);
  border-radius: 6px;
  display: grid;
  place-items: center;
  font-size: 0.7rem;
  flex-shrink: 0;
}
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
.limit-badge {
  font-size: 0.75rem;
  color: var(--text-muted);
  background: var(--violet-dim);
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
}
.limit-badge.pro {
  color: var(--purple);
  background: var(--purple-dim);
  font-weight: 600;
}
.btn-new-chat {
  display: flex;
  align-items: center;
  gap: 5px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.8rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-new-chat:hover {
  border-color: var(--purple);
  color: var(--purple);
  background: var(--purple-dim);
}
.btn-new-chat svg { width: 14px; height: 14px; }
/* ═══ Chat Layout ═══ */
.chat-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.messages-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
.messages-area::-webkit-scrollbar { width: 5px; }
.messages-area::-webkit-scrollbar-track { background: transparent; }
.messages-area::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 10px;
}
.messages-area::-webkit-scrollbar-thumb:hover {
  background: rgba(5, 150, 105, 0.3);
}
/* ═══ Messages ═══ */
.msg-row {
  display: flex;
  max-width: 780px;
  width: 100%;
  margin: 0 auto;
  animation: msgIn 0.3s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg-row.user { justify-content: flex-end; }
.msg-row.assistant { justify-content: flex-start; }
.msg-row.system { justify-content: center; }
.msg-bubble {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 0.925rem;
  line-height: 1.65;
  word-break: break-word;
}
.msg-row.user .msg-bubble {
  background: linear-gradient(135deg, var(--purple), #047857);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg-row.assistant .msg-bubble {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  border-bottom-left-radius: 4px;
}
.msg-row.system .msg-bubble {
  background: var(--red-dim);
  border: 1px solid rgba(239, 68, 68, 0.2);
  color: #FCA5A5;
  font-size: 0.85rem;
  max-width: 90%;
  text-align: center;
}
.msg-row.system .msg-bubble .retry-btn {
  display: inline-block;
  margin-top: 6px;
  color: var(--red);
  background: transparent;
  border: 1px solid rgba(239, 68, 68, 0.3);
  padding: 4px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: inherit;
  transition: all 0.2s;
}
.msg-row.system .msg-bubble .retry-btn:hover {
  background: rgba(239, 68, 68, 0.15);
}
/* Assistant label */
.msg-row.assistant .msg-wrapper { display: flex; flex-direction: column; gap: 0; max-width: 85%; }
.msg-row.assistant .msg-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
  padding-left: 4px;
}
/* Markdown inside assistant messages */
.msg-bubble strong, .msg-bubble b { color: var(--white); font-weight: 600; }
.msg-bubble a { color: var(--violet); text-decoration: underline; text-underline-offset: 2px; }
.msg-bubble a:hover { color: var(--purple); }
.msg-bubble ul, .msg-bubble ol {
  margin: 6px 0 6px 20px;
}
.msg-bubble li { margin-bottom: 4px; }
.msg-bubble p { margin-bottom: 8px; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble code {
  background: rgba(5, 150, 105, 0.12);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 0.85em;
  font-family: 'JetBrains Mono', monospace;
}
/* Source chips */
.sources-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
  padding-left: 4px;
}
.source-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--violet-dim);
  color: var(--violet);
  font-size: 0.72rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid rgba(52, 211, 153, 0.15);
  white-space: nowrap;
}
.source-chip svg { width: 11px; height: 11px; opacity: 0.7; }
/* ═══ Verification Bar ═══ */
.verify-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
  margin-top: 6px;
  padding: 6px 8px;
  background: rgba(5,150,105,0.06);
  border-radius: 8px;
  border: 1px solid rgba(5,150,105,0.12);
}
.verify-label {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.7rem;
  font-weight: 600;
  color: #059669;
  margin-right: 4px;
}
.verify-chip {
  font-size: 0.68rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 12px;
  white-space: nowrap;
}
.verify-chip.verified {
  background: rgba(5,150,105,0.12);
  color: #059669;
  border: 1px solid rgba(5,150,105,0.25);
}
.verify-chip.unverified {
  background: rgba(245,158,11,0.1);
  color: #d97706;
  border: 1px solid rgba(245,158,11,0.25);
}
/* ═══ Welcome ═══ */
.welcome-section {
  max-width: 640px;
  margin: 0 auto;
  text-align: center;
  padding: 40px 16px 20px;
  animation: msgIn 0.5s ease;
}
.welcome-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--purple), #34D399);
  border-radius: 18px;
  display: grid;
  place-items: center;
  margin: 0 auto 16px;
  font-size: 1.8rem;
  box-shadow: 0 8px 32px var(--purple-glow);
}
.welcome-title {
  font-family: 'Outfit', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 8px;
}
.welcome-text {
  font-size: 0.925rem;
  color: var(--text-dim);
  line-height: 1.6;
  margin-bottom: 24px;
}
.example-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.example-chip {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 0.82rem;
  padding: 8px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  text-align: left;
  line-height: 1.4;
}
.example-chip:hover {
  border-color: var(--purple);
  background: var(--bg-card-hover);
  color: var(--white);
  transform: translateY(-1px);
}
/* ═══ Typing Indicator ═══ */
.typing-indicator {
  display: flex;
  gap: 5px;
  padding: 14px 18px;
}
.typing-indicator span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: typeBounce 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
@keyframes typeBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}
/* ═══ Input Area ═══ */
.input-area {
  flex-shrink: 0;
  padding: 12px 16px 16px;
  background: rgba(15, 11, 26, 0.95);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.input-wrapper {
  max-width: 780px;
  margin: 0 auto;
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.input-field {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.925rem;
  line-height: 1.5;
  resize: none;
  outline: none;
  transition: border-color 0.2s;
  max-height: 96px; /* ~3 lines */
  overflow-y: auto;
}
.input-field::placeholder { color: var(--text-muted); }
.input-field:focus { border-color: var(--purple); }
.input-field::-webkit-scrollbar { width: 4px; }
.input-field::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
.btn-send {
  width: 44px;
  height: 44px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--purple), #047857);
  color: #fff;
  cursor: pointer;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  transition: all 0.2s;
}
.btn-send:hover:not(:disabled) {
  transform: scale(1.05);
  box-shadow: 0 4px 16px var(--purple-glow);
}
.btn-send:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
.btn-send svg { width: 20px; height: 20px; }
.input-hint {
  max-width: 780px;
  margin: 6px auto 0;
  font-size: 0.7rem;
  color: var(--text-muted);
  text-align: center;
}
/* ═══ Limit Banner ═══ */
.limit-banner {
  max-width: 780px;
  margin: 0 auto 10px;
  background: var(--purple-dim);
  border: 1px solid rgba(5, 150, 105, 0.2);
  border-radius: 10px;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.85rem;
  color: var(--violet);
  animation: msgIn 0.3s ease;
}
.limit-banner a {
  color: var(--purple);
  font-weight: 600;
  text-decoration: underline;
  white-space: nowrap;
}
/* ═══ Mobile ═══ */
@media (max-width: 640px) {
  .chat-header { padding: 10px 14px; gap: 8px; }
  .header-title { font-size: 0.92rem; }
  .header-divider { display: none; }
  .btn-new-chat span { display: none; }
  .btn-new-chat { padding: 6px 8px; }
  .limit-badge { font-size: 0.7rem; padding: 3px 8px; }
  .messages-area { padding: 14px 10px; gap: 12px; }
  .msg-bubble { max-width: 92%; font-size: 0.875rem; }
  .msg-row.assistant .msg-wrapper { max-width: 92%; }
  .welcome-section { padding: 24px 10px 16px; }
  .welcome-title { font-size: 1.15rem; }
  .welcome-icon { width: 52px; height: 52px; font-size: 1.4rem; border-radius: 14px; }
  .example-chip { font-size: 0.78rem; padding: 7px 11px; }
  .input-area { padding: 10px 10px 14px; }
  .input-field { padding: 10px 14px; font-size: 0.875rem; }
}
</style>
<script async src="shared/error-tracker.js?v=a6f6c956"></script><style id="exo-loading-css">

(function(){
  if(document.getElementById('exo-loading'))return;
  var d=document.createElement('div');

  d.setAttribute('aria-live','polite');
  d.innerHTML='<div class="exo-spin" aria-hidden="true"></div><div class="exo-txt">Cargando…</div>';
  // Insertar al inicio del body en cuanto exista
  function inject(){
    if(!document.body){setTimeout(inject,10);return}
    if(!document.getElementById('exo-loading'))document.body.insertBefore(d,document.body.firstChild);
  }
  inject();
  function hide(){
    var el=document.getElementById('exo-loading');
    if(!el)return;
    el.classList.add('hide');
    setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},350);
  }
  if(document.readyState==='complete'||document.readyState==='interactive'){
    setTimeout(hide,30);
  }else{
    document.addEventListener('DOMContentLoaded',function(){setTimeout(hide,30)});
  }
  // Failsafe: nunca dejar el overlay más de 4s
  setTimeout(hide,4000);
})();

<script>

  /* ═══ Rate Limiting ═══ */
  function checkIALimit() {
    var key = isPro ? IA_LIMIT_KEY_PRO : IA_LIMIT_KEY;
    var max = isPro ? MAX_PRO : MAX_FREE;
    var data = JSON.parse(localStorage.getItem(key) || '{}');
    var today = new Date().toISOString().slice(0, 10);
    if (data.date !== today) return { allowed: true, count: 0, max: max };
    return { allowed: data.count < max, count: data.count, max: max };
  }
  function consumeIALimit() {
    var key = isPro ? IA_LIMIT_KEY_PRO : IA_LIMIT_KEY;
    var today = new Date().toISOString().slice(0, 10);
    var data = JSON.parse(localStorage.getItem(key) || '{}');
    if (data.date !== today) { data.date = today; data.count = 0; }
    data.count++;
    localStorage.setItem(key, JSON.stringify(data));
  }
  function updateLimitUI() {
    var info = checkIALimit();
    var remaining = Math.max(0, info.max - info.count);

    if (remaining === 0) {
      var msg = isPro

      limitBanner.innerHTML =

          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
          '<span>' + msg + '</span>' +

  // Listener: cuando ia-pro-inline.js valida activación PRO, liberar cupo y refrescar UI

  /* ═══ PRO Check ═══ */
  function initPro() {
    // Optimistic PRO: si hay email/clave guardados, asumir PRO mientras el server confirma.
    // Evita que un cliente PRO sea limitado a 3/dia por la latencia del fetch a Apps Script.
    var hasSavedPro = (typeof exoPro !== 'undefined' && exoPro.getSaved && exoPro.getSaved());
    if (hasSavedPro) { isPro = true; updateLimitUI(); }
    if (typeof exoPro !== 'undefined' && exoPro.check) {
      exoPro.check().then(function(result) {
        isPro = !!result;
        updateLimitUI();
      }).catch(function() {
        if (!hasSavedPro) { isPro = false; updateLimitUI(); }

    } else if (!hasSavedPro) {
      isPro = false;
      updateLimitUI();

  }
  /* ═══ Markdown Renderer (simple) ═══ */
  function renderMarkdown(text) {
    // Escape HTML
    var html = text
      .replace(/&/g, '&amp;')
      .replace(/\x3c/g, '&lt;')
      .replace(/>/g, '&gt;');
    // Bold: **text** or __text__
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/__(.*?)__/g, '<strong>$1</strong>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Links: [text](url)
    html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // Unordered lists: lines starting with - or *
    html = html.replace(/^(\s*[-*])\s+(.+)$/gm, function(match, bullet, content) {
      return '<li>' + content + '</li>';
    });
    // Wrap consecutive <li> in <ul>
    html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
    // Ordered lists: lines starting with number.
    html = html.replace(/^(\s*\d+\.)\s+(.+)$/gm, function(match, num, content) {
      return '<oli>' + content + '</oli>';
    });
    html = html.replace(/((?:<oli>.*<\/oli>\n?)+)/g, function(match) {
      return '<ol>' + match.replace(/\x3c\/?oli>/g, function(t) {
        return t === '<oli>' ? '<li>' : '</li>';
      }) + '</ol>';
    });
    // Paragraphs: split by double newlines
    html = html.replace(/\n{2,}/g, '</p><p>');
    // Single newlines within a paragraph -> <br>
    html = html.replace(/\n/g, '<br>');
    html = '<p>' + html + '</p>';
    // Clean empty paragraphs
    html = html.replace(/\x3cp>\s*\x3c\/p>/g, '');
    return html;
  }
  /* ═══ Article Verification (RAG) ═══ */
  function verifyArticles(text, wrapperEl) {
    if (!wrapperEl) return;
    fetch(API_URL.replace(/\/[^/]+$/, '/verificar-articulos'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texto: text })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.articulos || data.articulos.length === 0) return;
      var bar = document.createElement('div');
      bar.className = 'verify-bar';
      var verified = data.verificados || 0;
      var total = data.total_citados || 0;
      bar.innerHTML = '<span class="verify-label">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg> ' +
        verified + '/' + total + ' art\u00edculos verificados en ET</span>';
      data.articulos.forEach(function(art) {
        var chip = document.createElement('span');
        chip.className = art.verificado ? 'verify-chip verified' : 'verify-chip unverified';
        chip.textContent = 'Art. ' + art.numero;
        if (art.titulo) chip.title = art.titulo;
        bar.appendChild(chip);
      });
      wrapperEl.appendChild(bar);
    })
    .catch(function() { /* silently ignore verification errors */ });
  }
  /* ═══ Source Extraction ═══ */
  function extractSources(text) {
    var sources = [];
    var cleanText = text;
    // Extract "Fuentes:" or "Fuente:" lines
    var fuenteRegex = /^(?:Fuentes?:\s*)(.+)$/gim;
    var match;
    while ((match = fuenteRegex.exec(text)) !== null) {
      var raw = match[1];
      // Split by comma or ;
      raw.split(/[,;]/).forEach(function(s) {
        s = s.trim();
        if (s) sources.push(s);
      });
      cleanText = cleanText.replace(match[0], '');
    }
    // Detect Art. patterns
    var artRegex = /Art(?:\.|culo|iculo|\.?\s*culo)?\s*\.?\s*(\d+(?:-\d+)?)\s*(?:del\s+)?(?:E\.?\s*T\.?|Estatuto\s+Tributario)/gi;
    while ((match = artRegex.exec(text)) !== null) {
      var artLabel = 'Art. ' + match[1] + ' ET';
      var exists = sources.some(function(s) { return s.indexOf(match[1]) !== -1; });
      if (!exists) sources.push(artLabel);
    }
    // Deduplicate
    var unique = [];
    var seen = {};
    sources.forEach(function(s) {
      var key = s.toLowerCase().replace(/\s+/g, ' ').trim();
      if (!seen[key]) { seen[key] = true; unique.push(s); }
    });
    return { cleanText: cleanText.trim(), sources: unique };
  }
  /* ═══ UI Helpers ═══ */
  function scrollToBottom() {
    requestAnimationFrame(function() {
      messagesArea.scrollTop = messagesArea.scrollHeight;
    });
  }
  function addMessageToUI(role, content, opts) {
    opts = opts || {};
    var row = document.createElement('div');
    row.className = 'msg-row ' + role;
    if (role === 'user') {
      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = content;
      row.appendChild(bubble);
    } else if (role === 'assistant') {
      var wrapper = document.createElement('div');
      wrapper.className = 'msg-wrapper';
      var label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = 'ExógenaDIAN IA';
      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.id = opts.id || '';
      if (opts.streaming) {
        bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
      } else {
        var extracted = extractSources(content);
        bubble.innerHTML = renderMarkdown(extracted.cleanText);
        if (extracted.sources.length > 0) {
          var bar = document.createElement('div');
          bar.className = 'sources-bar';
          extracted.sources.forEach(function(src) {
            var chip = document.createElement('span');
            chip.className = 'source-chip';
            chip.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' + escapeHtml(src);
            bar.appendChild(chip);
          });
          wrapper.appendChild(label);
          wrapper.appendChild(bubble);
          wrapper.appendChild(bar);
          row.appendChild(wrapper);
          messagesArea.appendChild(row);
          scrollToBottom();
          return row;
        }
      }
      wrapper.appendChild(label);
      wrapper.appendChild(bubble);
      row.appendChild(wrapper);
    } else if (role === 'system') {
      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = escapeHtml(content);
      if (opts.retry) {
        var retryBtn = document.createElement('button');
        retryBtn.className = 'retry-btn';
        retryBtn.textContent = 'Reintentar';
        retryBtn.onclick = function() {
          row.remove();
          retryLastMessage();
        };
        bubble.appendChild(document.createElement('br'));
        bubble.appendChild(retryBtn);
      }
      row.appendChild(bubble);
    }
    messagesArea.appendChild(row);
    scrollToBottom();
    return row;
  }
  function escapeHtml(t) {
    var d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
  }
  function setStreaming(val) {
    isStreaming = val;
    btnSend.disabled = val;
    inputField.disabled = val;
    if (!val) inputField.focus();
  }
  /* ═══ Welcome Screen ═══ */
  function showWelcome() {
    var welcome = document.createElement('div');
    welcome.className = 'welcome-section';
    welcome.id = 'welcomeSection';
    welcome.innerHTML =
      '<div class="welcome-icon">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:32px;height:32px"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 7V5a4 4 0 00-8 0v2"/></svg>' +
      '</div>' +
      '<h2 class="welcome-title">Exa IA — Asistente Contable</h2>' +
      '<p class="welcome-text">Soy Exa, tu asistente contable colombiano. Puedo ayudarte con contabilidad NIIF, tributaria, n\u00f3mina, laboral, seguridad social, facturaci\u00f3n electr\u00f3nica, estados financieros y m\u00e1s. Siempre cito la fuente normativa. \u26a0\ufe0f Mis respuestas son orientativas \u2014 valida con tu contador o abogado.</p>' +
      '<div class="example-chips">' +
        '<button class="example-chip" data-q="&iquest;C&oacute;mo liquido las prestaciones de un empleado que trabaj&oacute; 8 meses?">\u00bfC\u00f3mo liquido las prestaciones de un empleado que trabaj\u00f3 8 meses?</button>' +
        '<button class="example-chip" data-q="&iquest;Cu&aacute;les son los aportes a seguridad social para un independiente?">\u00bfCu\u00e1les son los aportes a seguridad social para un independiente?</button>' +
        '<button class="example-chip" data-q="&iquest;C&oacute;mo registro contablemente un leasing financiero en NIIF?">\u00bfC\u00f3mo registro contablemente un leasing financiero en NIIF?</button>' +
        '<button class="example-chip" data-q="&iquest;Qu&eacute; obligaciones tributarias tiene una SAS nueva?">\u00bfQu\u00e9 obligaciones tributarias tiene una SAS nueva?</button>' +
      '</div>';
    messagesArea.appendChild(welcome);

  /* ═══ Send Message ═══ */
  var lastUserText = '';
  function retryLastMessage() {
    if (lastUserText) sendMessage(lastUserText, true);
  }
  /* === Feedback util/no-util — los votos negativos alimentan el golden set === */
  var FEEDBACK_URL = API_URL.slice(0, API_URL.lastIndexOf('/')) + '/feedback';
  function addFeedbackBar(wrapper, question) {
    var bar = document.createElement('div');
    bar.style.cssText = 'display:flex;gap:6px;margin-top:6px;align-items:center;';
    var label = document.createElement('span');
    label.textContent = '¿Te sirvió?';
    label.style.cssText = 'font-size:11px;color:#94a3b8;';
    bar.appendChild(label);
    [['👍', true], ['👎', false]].forEach(function(opt) {
      var b = document.createElement('button');
      b.type = 'button';
      b.textContent = opt[0];
      b.setAttribute('aria-label', opt[1] ? 'Respuesta útil' : 'Respuesta no útil');
      b.style.cssText = 'border:1px solid #e2e8f0;background:transparent;border-radius:8px;padding:2px 8px;cursor:pointer;font-size:13px;line-height:1;';
      b.onclick = function() {
        Array.prototype.forEach.call(bar.querySelectorAll('button'), function(x){ x.disabled = true; x.style.opacity = 0.4; });
        b.style.opacity = 1; b.style.borderColor = '#6366F1';
        label.textContent = '¡Gracias!';
        try {
          fetch(FEEDBACK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tool: 'asistente', helpful: opt[1], question: String(question || '').slice(0, 380) }) });
        } catch (e) {}
      };
      bar.appendChild(b);
    });
    wrapper.appendChild(bar);
  }
  async function sendMessage(userText, isRetry) {
    if (isStreaming) return;
    userText = userText.trim();
    if (!userText) return;
    lastUserText = userText;
    // Rate limit check (both free and PRO)
    var limit = checkIALimit();
    if (!limit.allowed) {
      updateLimitUI();
      return;
    }
    // Remove welcome
    var welcomeEl = document.getElementById('welcomeSection');
    if (welcomeEl) welcomeEl.remove();
    // Add user message
    if (!isRetry) {
      history.push({ role: 'user', content: userText });
      if (history.length > MAX_HISTORY) history = history.slice(-MAX_HISTORY);
    }
    addMessageToUI('user', userText);
    // Clear input
    inputField.value = '';
    autoGrow();
    // Create assistant bubble
    var msgId = 'stream_' + Date.now();
    var assistantRow = addMessageToUI('assistant', '', { streaming: true, id: msgId });
    var bubble = document.getElementById(msgId);
    setStreaming(true);
    try {
      // AbortController with 90s timeout to prevent infinite streams
      var controller = new AbortController();
      var timeoutId = setTimeout(function() { controller.abort(); }, 90000);
      // El backend solo acepta roles user/assistant (no 'system'); inyectamos el
      // CALENDAR_KB dentro del PRIMER mensaje user para que el modelo lo vea sin
      // romper la validación. No se muta el history mostrado en pantalla.
      var outgoing = history.slice();
      for (var oi = 0; oi < outgoing.length; oi++) {
        if (outgoing[oi].role === 'user') {
          outgoing[oi] = { role: 'user', content: CALENDAR_KB + '\n\n---\n\n' + outgoing[oi].content };
          break;
        }
      }
      var response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: outgoing }),
        signal: controller.signal
      });
      if (!response.ok) {
        clearTimeout(timeoutId);
        var msg = 'Error del servidor (' + response.status + ')';
        try { var d = await response.json(); if (d && d.error) msg = d.error; } catch(e){}
        throw new Error(msg);
      }
      var reader = response.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';
      var fullText = '';
      var firstChunk = true;
      var streamDone = false;
      var lastChunkTime = Date.now();
      while (!streamDone) {
        var result = await reader.read();
        if (result.done) break;
        // Guard: if no new data in 30s, break
        var now = Date.now();
        if (now - lastChunkTime > 30000 && fullText.length > 0) { streamDone = true; break; }
        lastChunkTime = now;
        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line in buffer
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line.startsWith('data: ')) continue;
          try {
            var event = JSON.parse(line.slice(6));
            if (event.type === 'text' && event.text) {
              if (firstChunk) {
                bubble.innerHTML = '';
                firstChunk = false;
              }
              fullText += event.text;
              // Render progressively
              bubble.innerHTML = renderMarkdown(fullText);
              scrollToBottom();
            } else if (event.type === 'done') {
              // Finalize — exit both loops
              streamDone = true;
              break;
            } else if (event.type === 'error') {
              throw new Error(event.error || 'Error desconocido');
            }
          } catch (parseErr) {
            if (parseErr.message && !parseErr.message.includes('JSON')) {
              throw parseErr;
            }
          }
        }
      }
      // Ensure reader is released
      try { reader.cancel(); } catch(e) {}
      // Finalize the message with sources
      if (fullText) {
        var extracted = extractSources(fullText);
        bubble.innerHTML = renderMarkdown(extracted.cleanText);
        if (extracted.sources.length > 0) {
          var wrapper = bubble.parentElement;
          var bar = document.createElement('div');
          bar.className = 'sources-bar';
          extracted.sources.forEach(function(src) {
            var chip = document.createElement('span');
            chip.className = 'source-chip';
            chip.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' + escapeHtml(src);
            bar.appendChild(chip);
          });
          wrapper.appendChild(bar);
        }
        // Verificar artículos citados contra el ET real
        verifyArticles(fullText, bubble.parentElement);
        // Feedback del usuario sobre esta respuesta
        addFeedbackBar(bubble.parentElement, userText);
        // Add to history
        history.push({ role: 'assistant', content: fullText });
        if (history.length > MAX_HISTORY) history = history.slice(-MAX_HISTORY);
        // Consume limit after successful response (free and PRO)
        consumeIALimit();
        updateLimitUI();
      }
      scrollToBottom();
    } catch (err) {
      // Remove the streaming bubble
      if (assistantRow && assistantRow.parentElement) {
        assistantRow.remove();
      }
      // Remove the failed assistant entry from history if partially added
      addMessageToUI('system', err.message || 'Error al conectar con la IA. Intenta de nuevo.', { retry: true });
    } finally {
      setStreaming(false);
      scrollToBottom();
    }
  }
  /* ═══ Input Auto-grow ═══ */
  function autoGrow() {
    inputField.style.height = 'auto';
    inputField.style.height = Math.min(inputField.scrollHeight, 96) + 'px';
  }
  /* ═══ New Chat ═══ */
  function clearChat() {
    history = [];
    messagesArea.innerHTML = '';
    showWelcome();
    updateLimitUI();
    inputField.value = '';
    autoGrow();
    inputField.focus();
  }
  /* ═══ Event Listeners ═══ */
  inputField.addEventListener('input', autoGrow);
  inputField.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(inputField.value);
    }
  });
  btnSend.addEventListener('click', function() {
    sendMessage(inputField.value);
  });
  btnNewChat.addEventListener('click', clearChat);
  // Example chip clicks (delegated)
  messagesArea.addEventListener('click', function(e) {
    var chip = e.target.closest('.example-chip');
    if (chip) {
      var q = chip.textContent.trim();
      sendMessage(q);
    }
  });
  /* ═══ Init ═══ */
  showWelcome();
  initPro();
  inputField.focus();
})();
