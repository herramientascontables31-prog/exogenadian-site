<!DOCTYPE html>
<html lang="es-CO" data-theme="light">
<head>
<meta charset="UTF-8"><link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin><link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin><link rel="dns-prefetch" href="https://cdnjs.cloudflare.com"><link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero · Gestión de tareas en equipo</title>
<style>
  :root{
    --bg:#f5f6f8; --panel:#ffffff; --ink:#1c2430; --muted:#6b7787; --line:#e6e9ee;
    --col-bg:#eef0f3; --card-bg:#ffffff; --th-bg:#fafbfc; --hover:#fafbfe; --chip-bg:#f1f3f6; --input-bg:#ffffff;
    --brand:#4f46e5; --brand-soft:#4f46e522;
    --p-urgente:#dc2626; --p-alta:#ea580c; --p-media:#0ea5e9; --p-baja:#64748b;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.1);
    --shadow-lg:0 10px 30px rgba(16,24,40,.18);
    --radius:12px;
  }
  html[data-theme="dark"]{
    --bg:#0f141b; --panel:#161d27; --ink:#e7ebf1; --muted:#8a96a6; --line:#27313d;
    --col-bg:#131a23; --card-bg:#1b232e; --th-bg:#151c25; --hover:#1f2935; --chip-bg:#222d3a; --input-bg:#131a23;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.4);
    --shadow-lg:0 12px 34px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
  button{font-family:inherit;cursor:pointer}
  header.top{background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .top-inner{max-width:1320px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:12px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.02em;font-size:17px}
  .logo .mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--brand),color-mix(in srgb,var(--brand) 55%,#ffffff));display:grid;place-items:center;color:#fff;font-size:15px}
  .ws-pill{margin-left:2px;background:var(--brand-soft);color:var(--brand);border:1px solid var(--brand-soft);padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .backlink{color:var(--muted);text-decoration:none;font-size:12.5px;font-weight:600;padding:7px 9px;border-radius:8px;white-space:nowrap}
  .backlink:hover{color:var(--brand);background:var(--hover)}
  .top-spacer{flex:1}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:8px 14px;border-radius:9px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:.12s}
  .btn:hover{background:var(--hover)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.primary:hover{filter:brightness(.93)}
  .btn.sm{padding:6px 10px;font-size:12px}
  .iconbtn{border:1px solid var(--line);background:var(--panel);color:var(--ink);width:36px;height:36px;border-radius:9px;display:grid;place-items:center;font-size:16px}
  .iconbtn:hover{background:var(--hover)}
  .avatars{display:flex}
  .avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:12px;border:2px solid var(--panel);margin-left:-8px;box-shadow:var(--shadow)}
  .subbar{position:sticky;top:56px;z-index:20;background:var(--bg);max-width:1320px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .tabs{display:flex;background:var(--col-bg);border-radius:10px;padding:3px}
  .tab{border:none;background:none;padding:7px 16px;border-radius:8px;font-weight:600;color:var(--muted);font-size:13px}
  .tab.active{background:var(--panel);color:var(--ink);box-shadow:var(--shadow)}
  .filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex:1}
  .search{position:relative}
  .search input{border:1px solid var(--line);border-radius:9px;padding:8px 12px 8px 32px;font-size:13px;width:200px;outline:none;background:var(--input-bg);color:var(--ink)}
  .search input:focus{border-color:var(--brand)}
  .search svg{position:absolute;left:9px;top:9px;color:var(--muted)}
  select.flt{border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13px;background:var(--input-bg);color:var(--ink);outline:none}
  select.flt:focus{border-color:var(--brand)}
  .clearflt{font-size:12px;color:var(--muted);background:none;border:none;text-decoration:underline}
  main{max-width:1320px;margin:0 auto;padding:14px 20px 60px}
  /* quick add */
  .qadd-wrap{max-width:1320px;margin:12px auto 0;padding:0 20px}
  .qadd{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:8px 12px 8px 14px;box-shadow:var(--shadow)}
  .qadd:focus-within{border-color:var(--brand)}
  .qadd input{flex:1;border:none;background:none;outline:none;font-size:14px;color:var(--ink);font-family:inherit}
  .qadd .hint{font-size:11px;color:var(--muted);white-space:nowrap;font-weight:600}
  .qadd-preview{font-size:12.5px;padding:7px 4px 0;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .qadd-preview .pchip{background:var(--col-bg);border-radius:999px;padding:2px 9px;font-weight:600;color:var(--ink)}
  /* layout + board */
  .layout{display:flex;gap:16px;align-items:flex-start}
  .layout .board{flex:1;min-width:0}
  .board{display:grid;grid-template-columns:repeat(var(--ncols,4),1fr);gap:14px;align-items:start}
  .col{background:var(--col-bg);border-radius:var(--radius);padding:10px;min-height:120px}
  .col.drag-over{outline:2px dashed var(--brand);outline-offset:-2px}
  .col-head{display:flex;align-items:center;gap:8px;padding:4px 6px 10px;font-weight:700;font-size:13px}
  .dot{width:9px;height:9px;border-radius:50%}
  .col-count{margin-left:auto;background:var(--panel);color:var(--muted);border-radius:999px;padding:1px 8px;font-size:12px;font-weight:700}
  .col-body{display:flex;flex-direction:column}
  .card{position:relative;background:var(--card-bg);border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;border:1px solid var(--line);border-left:3px solid transparent}
  .card.dragging{opacity:.4}
  .card.ov{border-left-color:var(--p-urgente)}
  .card.td{border-left-color:var(--p-alta)}
  .card.done{opacity:.55}
  .card h4{margin:0 0 4px;font-size:13.5px;font-weight:650;line-height:1.35;padding-right:64px}
  .card.done h4{text-decoration:line-through;text-decoration-color:var(--muted)}
  .card .desc{font-size:12px;color:var(--muted);line-height:1.4;margin:0 0 6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:.12s}
  .card:hover .card-actions{opacity:1}
  .ca-btn{border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:12px;line-height:1;width:24px;height:24px;border-radius:6px;display:grid;place-items:center}
  .ca-btn:hover{color:var(--brand);border-color:var(--brand)}
  .ca-btn.done:hover{color:var(--s-comp,#16a34a);border-color:#16a34a}
  .ca-btn.del:hover{color:var(--p-urgente);border-color:var(--p-urgente)}
  .card .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px}
  .chip{font-size:11px;font-weight:650;padding:2px 8px;border-radius:999px;display:inline-flex;align-items:center;gap:4px}
  .pchip-proj{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:999px;color:#fff}
  .due{font-size:11.5px;font-weight:600;color:var(--muted);display:inline-flex;align-items:center;gap:4px}
  .due.overdue{color:var(--p-urgente)}
  .due.soon{color:var(--p-alta)}
  .card .foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
  .mini-av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:11px;flex:none}
  .prog{flex:1;margin:0 10px;height:5px;background:var(--col-bg);border-radius:999px;overflow:hidden}
  .prog > i{display:block;height:100%;background:var(--brand)}
  .tag{font-size:10.5px;color:var(--muted);background:var(--chip-bg);border-radius:6px;padding:1px 6px;margin-right:4px}
  .add-card{width:100%;border:1px dashed var(--line);background:none;color:var(--muted);padding:8px;border-radius:9px;font-weight:600;font-size:12.5px}
  .add-card:hover{background:var(--panel);color:var(--brand);border-color:var(--brand)}
  /* tabla */
  table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);cursor:pointer;user-select:none;background:var(--th-bg)}
  th:hover{color:var(--ink)}
  tbody tr:hover{background:var(--hover);cursor:pointer}
  td .resp{display:flex;align-items:center;gap:7px}
  .badge{font-size:11px;font-weight:650;padding:2px 9px;border-radius:999px}
  /* lista (tabla = tarjetas horizontales) */
  .tlist{display:flex;flex-direction:column;gap:10px}
  .lcard{position:relative;display:flex;align-items:center;gap:14px;background:var(--card-bg);border:1px solid var(--line);border-left:3px solid transparent;border-radius:10px;padding:12px 14px;box-shadow:var(--shadow);cursor:pointer;transition:.12s}
  .lcard:hover{border-color:var(--brand)}
  .lcard.ov{border-left-color:var(--p-urgente)}
  .lcard.td{border-left-color:var(--p-alta)}
  .lcard.done{opacity:.55}
  .lcard.done .lc-title{text-decoration:line-through;text-decoration-color:var(--muted)}
  .lc-left{flex:1.3;min-width:0}
  .lc-mid{flex:1.5;min-width:0;color:var(--muted);font-size:12.5px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .lc-mid .lcm-empty{opacity:.45}
  .lc-top{display:flex;align-items:center;gap:8px;min-width:0}
  .lc-title{font-size:14px;font-weight:650;line-height:1.3;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lc-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px}
  .lc-right{display:flex;align-items:center;gap:14px;flex:none}
  .lc-resp{display:flex;align-items:center;gap:8px;width:185px;min-width:0}
  .lc-resp .nm{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .avstack{display:flex;flex:none}
  .avstack .mini-av{margin-left:-8px;border:2px solid var(--card-bg)}
  .avstack .mini-av:first-child{margin-left:0}
  .mini-av.more{background:var(--chip-bg);color:var(--muted)}
  .lc-prog{width:88px;flex:none}
  .lc-prog .prog{margin:0}
  .lc-prog .pl{font-size:11px;color:var(--muted);font-weight:600;text-align:right;display:block;margin-top:3px}
  .lc-actions{display:flex;gap:4px;opacity:0;transition:.12s}
  .lcard:hover .lc-actions{opacity:1}
  .rsel{display:flex;flex-wrap:wrap;gap:6px}
  .rchip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:3px 11px 3px 4px;font-size:12.5px;font-weight:600;cursor:pointer;background:var(--input-bg);color:var(--ink)}
  .rchip .mini-av{width:20px;height:20px;font-size:10px}
  .rchip.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}
  @media(max-width:760px){.lcard{flex-wrap:wrap}.lc-mid{flex-basis:100%;order:3}.lc-right{width:100%;justify-content:space-between}.lc-resp{width:auto;flex:1}}
  /* carga */
  .cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .stat{background:var(--panel);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
  .stat .n{font-size:26px;font-weight:800;letter-spacing:-.02em}
  .stat .l{color:var(--muted);font-size:12.5px;font-weight:600;margin-top:2px}
  .workload{background:var(--panel);border-radius:var(--radius);padding:6px 18px 14px;box-shadow:var(--shadow)}
  .wl-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--line)}
  .wl-row:last-child{border-bottom:none}
  .wl-person{display:flex;align-items:center;gap:9px;width:200px;font-weight:600}
  .wl-bar{flex:1;display:flex;height:24px;border-radius:7px;overflow:hidden;background:var(--col-bg)}
  .wl-seg{height:100%}
  .wl-total{width:130px;text-align:right;color:var(--muted);font-size:12.5px;font-weight:600}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:4px 0 0;padding:12px 0 4px}
  .legend span{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-weight:600}
  /* agenda lateral */
  .agenda{width:330px;flex:none;position:sticky;top:120px;max-height:calc(100vh - 136px);overflow-y:auto;display:flex;flex-direction:column;gap:14px}
  .ag-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}
  .ag-today{background:linear-gradient(135deg,var(--brand),color-mix(in srgb,var(--brand) 62%,#000));color:#fff;border:none}
  .ag-title-h{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:flex;align-items:center;gap:7px;margin-bottom:10px}
  .ag-today .ag-title-h{color:rgba(255,255,255,.72)}
  .ag-overdue .ag-title-h{color:var(--p-urgente)}
  .ag-count{margin-left:auto;font-weight:800}
  .ag-item{display:flex;align-items:flex-start;gap:9px;padding:8px;border-radius:8px;cursor:pointer;transition:.1s}
  .ag-item:hover{background:var(--hover)}
  .ag-today .ag-item{background:rgba(255,255,255,.09);margin-bottom:5px}
  .ag-today .ag-item:hover{background:rgba(255,255,255,.18)}
  .ag-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:none}
  .ag-info{flex:1;min-width:0}
  .ag-title{font-size:12.5px;font-weight:600;line-height:1.35}
  .ag-meta{font-size:11px;color:var(--muted);margin-top:1px}
  .ag-today .ag-title{color:#fff}.ag-today .ag-meta{color:rgba(255,255,255,.62)}
  .ag-empty{font-size:12px;color:var(--muted);font-style:italic;padding:4px 2px}
  .ag-today .ag-empty{color:rgba(255,255,255,.6)}
  .ag-day{margin-bottom:9px}.ag-day:last-child{margin-bottom:0}
  .ag-day-h{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 3px 2px}
  .ag-day-h .nday{color:var(--ink)}
  .ag-more{font-size:11.5px;font-weight:700;color:var(--brand);cursor:pointer;padding:5px 8px;border-radius:7px;display:inline-block}
  .ag-more:hover{background:var(--hover)}
  .ag-today .ag-more{color:#fff;opacity:.85}.ag-today .ag-more:hover{background:rgba(255,255,255,.14)}
  /* calendario */
  .cal{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .cal-head{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .cal-head h3{margin:0;font-size:15px;text-transform:capitalize}
  .cal-nav{display:flex;gap:6px;margin-left:auto}
  .cal-seg{display:flex;background:var(--col-bg);border-radius:9px;padding:3px}
  .cal-seg button{border:none;background:none;padding:6px 12px;border-radius:7px;font-weight:600;color:var(--muted);font-size:12.5px}
  .cal-seg button.on{background:var(--panel);color:var(--ink);box-shadow:var(--shadow)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-dow{padding:9px 8px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--line);background:var(--th-bg)}
  .cal-cell{min-width:0;overflow:hidden;min-height:98px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:5px 6px;display:flex;flex-direction:column;gap:3px}
  .cal-cell:nth-child(7n){border-right:none}
  .cal-cell.out{background:var(--th-bg)}
  .cal-num{font-size:12px;font-weight:700;color:var(--muted);align-self:flex-end;line-height:1.6}
  .cal-cell.today .cal-num{background:var(--brand);color:#fff;border-radius:50%;width:22px;height:22px;display:grid;place-items:center;line-height:1}
  .cal-task{font-size:11px;font-weight:600;color:#fff;border-radius:5px;padding:2px 6px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cal-more{font-size:10.5px;color:var(--brand);font-weight:700;padding:1px 4px;cursor:pointer;border-radius:4px}
  .cal-more:hover{background:var(--hover)}
  .cal-nofecha{padding:10px 16px;color:var(--muted);font-size:12.5px;border-top:1px solid var(--line)}
  /* calendario semana */
  .cal-week{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-wcell{min-width:0;overflow-y:auto;border-right:1px solid var(--line);padding:8px 7px;min-height:340px;max-height:calc(100vh - 230px);display:flex;flex-direction:column;gap:5px}
  .cal-wcell:last-child{border-right:none}
  .cal-whd{font-size:11px;font-weight:800;color:var(--muted);text-align:center;padding-bottom:6px;text-transform:uppercase;position:sticky;top:0;background:var(--panel)}
  .cal-whd.today{color:var(--brand)}
  .cal-wtask{font-size:11.5px;font-weight:600;color:#fff;border-radius:7px;padding:5px 8px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* calendario año */
  .cal-year{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:14px}
  .cal-mini{cursor:pointer;border:1px solid var(--line);border-radius:10px;padding:9px}
  .cal-mini:hover{border-color:var(--brand)}
  .cal-mini h4{margin:0 0 7px;font-size:12px;text-transform:capitalize;text-align:center}
  .cal-mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cal-mini-d{font-size:9px;text-align:center;padding:2px 0;border-radius:3px;color:var(--muted)}
  .cal-mini-d.has{background:var(--brand);color:#fff;font-weight:700}
  .cal-mini-d.today{outline:1.5px solid var(--p-alta)}
  @media(max-width:760px){.cal-year{grid-template-columns:repeat(2,1fr)}}
  /* modales */
  .overlay{position:fixed;inset:0;background:rgba(16,24,40,.5);backdrop-filter:blur(2px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border-radius:16px;width:100%;max-width:640px;box-shadow:var(--shadow-lg);animation:pop .14s ease}
  @keyframes pop{from{transform:translateY(8px);opacity:.6}to{transform:none;opacity:1}}
  .modal .mhead{display:flex;align-items:center;gap:10px;padding:18px 20px;border-bottom:1px solid var(--line)}
  .modal .mhead .pr-strip{width:4px;height:26px;border-radius:3px}
  .modal h3{margin:0;font-size:16px;flex:1}
  .iclose{border:none;background:var(--chip-bg);width:30px;height:30px;border-radius:8px;font-size:16px;color:var(--muted)}
  .mbody{padding:18px 20px;display:grid;gap:14px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em}
  .field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;font-family:inherit;outline:none;background:var(--input-bg);color:var(--ink)}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--brand)}
  .field textarea{resize:vertical;min-height:64px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .range-row{display:flex;align-items:center;gap:10px}
  .range-row input[type=range]{flex:1;accent-color:var(--brand)}
  .mactions{display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:14px}
  .chk{display:flex;align-items:center;gap:8px;padding:4px 0}
  .chk input[type=checkbox]{width:16px;height:16px;accent-color:var(--brand);flex:none;cursor:pointer}

(function(){
  if(document.getElementById('exo-loading'))return;
  var d=document.createElement('div');
  d.id='exo-loading';
  d.setAttribute('aria-live','polite');
  d.innerHTML='<div class="exo-spin" aria-hidden="true"></div><div class="exo-txt">Cargando…</div>';
  // Insertar al inicio del body en cuanto exista
  function inject(){
    if(!document.body){setTimeout(inject,10);return}
    if(!document.getElementById('exo-loading'))document.body.insertBefore(d,document.body.firstChild);
  }
  inject();
  function hide(){
    var el=document.getElementById('exo-loading');
    if(!el)return;
    el.classList.add('hide');
    setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},350);
  }
  // Páginas pesadas pueden RETENER el overlay hasta estar listas:
  //   window.EXO_LOADING_HOLD=true  (en un <script> del body, antes de DOMContentLoaded)
  //   window.exoLoadingHide()       (cuando la app ya es usable)
  //   window.exoLoadingText('…')    (mensaje propio, p.ej. 'Cargando el liquidador 210…')
  window.exoLoadingHide=hide;
  window.exoLoadingText=function(t){ var x=d.querySelector('.exo-txt'); if(x)x.textContent=t; };
  function autoHide(){ if(!window.EXO_LOADING_HOLD) setTimeout(hide,30); }
  if(document.readyState==='complete'||document.readyState==='interactive'){
    autoHide();
  }else{
    document.addEventListener('DOMContentLoaded',autoHide);
  }
  // Failsafe: nunca atrapar al usuario (4s normal; 5s si la página lo retiene —
  // la apertura del 210 es optimista y la validación PRO va en background, nada
  // legítimo necesita retener más). Carrera vista en móvil: el hide de
  // DOMContentLoaded a veces pierde contra el hold → soltar también en load.
  setTimeout(function(){ if(!window.EXO_LOADING_HOLD) hide(); },4000);
  setTimeout(hide,5000);
  window.addEventListener('load',function(){ setTimeout(hide,600); });
})();
</script></head>

"><button class="btn" onclick="copyCode()">⧉ Copiar código</button><button class="btn" onclick="disconnectWs()">Salir del equipo aquí</button></div>\n      <div class="secttl" style="margin-top:18px">📅 Sincronizar con tu calendario</div>\n      <div class="cfg-note" style="font-size:12.5px;margin-bottom:8px">Suscribe este enlace en <b>Google Calendar</b> (⚙ Configuración → Añadir calendario → <b>Desde URL</b>) o en Outlook. Las tareas con fecha aparecen y se actualizan solas. Cada quien puede suscribirlo.</div>\n      <div class="cfg-add"><input id="icsUrl" readonly value="${API}/api/ws/ics?code=${esc(ws.code)}" onclick="this.select()"><button class="btn" onclick="copyIcs()">⧉ Copiar enlace</button><button class="btn" onclick="window.open('https://calendar.google.com/calendar/u/0/r/settings/addbyurl','_blank')">Abrir Calendar</button></div>`}else{e.innerHTML=`<div class="cfg-note" style="margin-bottom:14px;border:1px solid var(--p-alta);background:var(--input-bg)">⚠ <b>Tus datos están solo en este navegador.</b> Si borras el caché/historial, se pierden. Crea un equipo (se guardan en la nube y los ve todo tu equipo) o descarga un respaldo. <button class="btn sm" onclick="backupJSON()" style="margin-top:8px">💾 Descargar respaldo</button></div>\n      <div class="secttl">Crear equipo (requiere PRO)</div>\n      <div class="cfg-add"><input id="ccNombre" placeholder="Tu nombre"><input id="ccEmail" type="email" placeholder="Tu correo PRO"></div>\n      <div class="cfg-add"><input id="ccWs" placeholder="Nombre del equipo" value="${esc(conf.wsName||"")}"><button class="btn primary" onclick="doCreate()">Crear equipo</button></div>\n      <div class="cfg-note" style="margin-bottom:16px">Se sube tu tablero actual y obtienes un código para invitar a tu equipo (ellos entran gratis, sin PRO).</div>\n      <div class="secttl">Entrar a un equipo</div>\n      <div class="cfg-add"><input id="cjCode" placeholder="Código" style="text-transform:uppercase"><input id="cjNombre" placeholder="Tu nombre"></div>\n      <div class="cfg-add"><input id="cjEmail" type="email" placeholder="Tu correo (para recordatorios)"><button class="btn primary" onclick="doJoin()">Entrar</button></div>`}}function copyCode(){if(ws&&navigator.clipboard){navigator.clipboard.writeText(ws.code).then(()=>toast("Código copiado"))}}function copyIcs(){const e=document.getElementById("icsUrl");if(e&&navigator.clipboard){navigator.clipboard.writeText(e.value).then(()=>toast("Enlace de calendario copiado"))}}function openCalSync(){if(connected()){openConn();toast("Copia el enlace y suscríbelo en Google Calendar (Desde URL)")}else{downloadLocalICS()}}function downloadLocalICS(){const pad=e=>String(e).padStart(2,"0");const e=(()=>{const e=new Date;return e.getUTCFullYear()+pad(e.getUTCMonth()+1)+pad(e.getUTCDate())+"T"+pad(e.getUTCHours())+pad(e.getUTCMinutes())+pad(e.getUTCSeconds())+"Z"})();const plus=e=>{const t=new Date(e+"T00:00:00");t.setDate(t.getDate()+1);return t.getFullYear()+pad(t.getMonth()+1)+pad(t.getDate())};const ie=e=>String(e==null?"":e).replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\r?\n/g,"\\n");const t=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Tablero//ES","X-WR-CALNAME:"+ie(conf.wsName||"Tablero")];let n=0;state.tasks.forEach(a=>{if(!a.due||a.estado===lastCol())return;n++;t.push("BEGIN:VEVENT","UID:"+ie(a.id)+"@tablero-local","DTSTAMP:"+e,"DTSTART;VALUE=DATE:"+a.due.replace(/-/g,""),"DTEND;VALUE=DATE:"+plus(a.due),"SUMMARY:"+ie(a.titulo));const o=[];if(a.desc)o.push(a.desc);if(a.resps||a.resp)o.push("Responsable: "+nameOf(a));if(a.prio)o.push("Prioridad: "+PRIOS[a.prio].label);if(a.proj)o.push("Proyecto: "+a.proj);if(o.length)t.push("DESCRIPTION:"+ie(o.join("\\n")));t.push("END:VEVENT")});t.push("END:VCALENDAR");if(!n){toast("No hay tareas con fecha para exportar");return}download("tablero-calendario.ics","data:text/calendar;charset=utf-8,"+encodeURIComponent(t.join("\r\n")));toast("Calendario .ics descargado — impórtalo en Google Calendar (es una foto del momento)")}async function doCreate(){const e=val("ccEmail"),t=val("ccNombre"),n=val("ccWs")||conf.wsName||"Mi equipo";if(!e){toast("Pon tu correo PRO");return}const a=(TEAM.find(t=>t.email&&t.email.toLowerCase()===e.toLowerCase())||TEAM[0]).id;const o=TEAM.find(e=>e.id===a)||TEAM[0];if(t)o.nombre=t;o.email=e;toast("Creando equipo…");try{const o=await api("/api/ws/create",{email:e,ownerNombre:t,ownerId:a,name:n,members:TEAM.slice(0,5),projects:PROJECTS,columns:COLUMNS,conf:conf,tasks:state.tasks});const s=(o.ws.members||[]).find(e=>e.role==="owner")||{id:a,nombre:t,email:e};ws={code:o.code,role:"owner",me:s};saveWs();applyServer(o);startPolling();closeConn();toast("Equipo creado · código "+o.code)}catch(e){toast(e.message==="not_pro"?"Ese correo no es PRO activo":"No se pudo crear: "+e.message)}}async function doJoin(){const e=val("cjCode").toUpperCase(),t=val("cjNombre"),n=val("cjEmail");if(!e||!t){toast("Código y nombre son obligatorios");return}toast("Entrando…");try{const a=await api("/api/ws/join",{code:e,nombre:t,email:n});ws={code:e,role:"member",me:a.member};saveWs();const o=await api("/api/ws/get",{code:e});applyServer(o);startPolling();closeConn();toast("Entraste a "+(a.ws.name||"el equipo"))}catch(e){toast(e.message==="full"?"El equipo está lleno (máx 5)":e.message==="not_found"?"Código no encontrado":"No se pudo entrar: "+e.message)}}function disconnectWs(){if(!confirm("¿Salir del equipo en este dispositivo? El tablero compartido sigue en la nube; aquí volverás a tu copia local."))return;ws=null;saveWs();stopPolling();toast("Saliste del equipo");location.reload()}function openOnb(){renderOnb();document.getElementById("onbOverlay").classList.add("show")}function closeOnb(){document.getElementById("onbOverlay").classList.remove("show");localStorage.setItem("tablero_onb_v1","1")}function renderOnb(){document.getElementById("onbBody").innerHTML=`<div class="tut">\n    <p class="muted">Guía rápida del tablero. Puedes reabrirla cuando quieras con el botón <b>?</b> de arriba.</p>\n    <h4>🗂️ El tablero</h4>\n    <p>Organiza tareas en <b>columnas</b>. <b>Arrastra</b> una tarjeta para cambiar su estado, o crea con <b>＋ Nueva tarea</b>. Al pasar el mouse sobre una tarjeta: <b>✓</b> completar, <b>✉</b> notificar, <b>✕</b> eliminar.</p>\n    <h4>👀 Cuatro vistas</h4>\n    <p><b>Tablero</b> (columnas que arrastras), <b>Tabla</b> (lista ordenada por vencimiento), <b>Calendario</b> (semana / mes / año) y <b>Carga del equipo</b> (cuánto tiene cada persona). Cambias arriba a la izquierda.</p>\n    <h4>✍️ Tareas y proyectos</h4>\n    <p>Cada tarea tiene responsable(s), estado, prioridad, vencimiento, avance, etiquetas, subtareas y comentarios, y puede <b>repetirse</b> (cada día/semana/mes). Los <b>proyectos</b> se crean en <b>⚙️ Config</b> o en el campo "Proyecto → ➕ Nuevo proyecto". Colores, modo oscuro y plantillas en <b>🎨 Aspecto</b>.</p>\n    <h4>👥 Modo equipo — cómo funciona</h4>\n    <div class="box">\n      <b>1.</b> Tú (el <b>dueño</b>, con cuenta <b>PRO</b>) tocas el chip de arriba → <b>Crear equipo</b>. Se sube tu tablero a la nube y obtienes un <b>código de 6 letras</b>.<br><br>\n      <b>2.</b> Compartes el código. Cada miembro entra con <b>Entrar a un equipo</b> + su nombre y correo. <b>No necesitan PRO</b> ni pagan. Máximo <b>5 personas</b>.<br><br>\n      <b>3.</b> <b>Todos ven y editan el mismo tablero.</b> Los cambios se sincronizan solos (cada ~25 s y al volver a la ventana). Si dos personas editan tareas distintas, no se pisan.<br><br>\n      <b>4.</b> Los datos quedan <b>en la nube</b>: aunque borres el caché o cambies de computador, al entrar con el código vuelves a verlo todo. <b>A salvo.</b><br><br>\n      <b>5.</b> Roles: el <b>dueño</b> puede todo (incluido administrar miembros); los <b>miembros</b> crean y editan. Si el PRO del dueño se vence, el tablero queda en <b>solo lectura</b> (no se borra nada).\n    </div>\n    <h4>📅 Google Calendar</h4>\n    <p>En <b>Calendario → 📅 Google Calendar</b>: con equipo te da un <b>enlace</b> que cada quien suscribe en su Google Calendar (se actualiza solo); en modo solo, descarga un archivo <b>.ics</b> para importar.</p>\n    <h4>💾 Respaldo de tus datos</h4>\n    <p><b>Con equipo</b>, tus datos viven en la nube (seguros). <b>Sin equipo</b> (solo tú), viven en este navegador: si borras el caché se pierden, así que descarga un respaldo desde <b>⚙️ Config → Datos</b> — o mejor, crea un equipo.</p>\n  </div>`}function fillSelects(){document.getElementById("fResp").innerHTML='<option value="">Todos</option>'+TEAM.map(e=>`<option value="${e.id}">${esc(e.nombre)}</option>`).join("");const e=document.getElementById("topAvatars");e.innerHTML="";TEAM.slice(0,5).forEach(t=>e.insertAdjacentHTML("beforeend",`<span class="avatar" style="background:${t.color}" title="${esc(t.nombre)}">${initials(t.nombre)}</span>`))}function fillProjects(){document.getElementById("fProj").innerHTML='<option value="">Proyecto</option>'+PROJECTS.map(e=>`<option value="${esc(e.nombre)}">${esc(e.nombre)}</option>`).join("")}document.getElementById("mPrio").addEventListener("change",e=>{document.getElementById("mPrStrip").style.background=PRIOS[e.target.value].color});document.getElementById("mProj").addEventListener("change",function(){if(this.value==="__new__"){const e=prompt("Nombre del nuevo proyecto:");if(e&&e.trim()){const t=e.trim();if(!PROJECTS.some(e=>e.nombre===t)){PROJECTS.push({nombre:t,color:PALETTE[PROJECTS.length%PALETTE.length]});saveProjects();fillProjects()}buildProjectSelect(t)}else{this.value=""}}});window.addEventListener("keydown",e=>{if(e.key==="Escape"){closeModal();closeSettings();closeCfg();closeConn();closeOnb()}});window.addEventListener("focus",()=>{if(connected())pollWs()});loadConf();if(conf.calView)calView=conf.calView;loadTeam();loadWs();applyAppearance();loadTasks();loadProjects();fillSelects();fillProjects();updateConnChip();render();if(connected()){startPolling();pollWs()}if(!localStorage.getItem("tablero_onb_v1"))setTimeout(openOnb,400);</script>
</body>
