<!DOCTYPE html>
<html lang="es-CO" data-theme="light">
<head>
<meta charset="UTF-8"><link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin><link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin><link rel="dns-prefetch" href="https://cdnjs.cloudflare.com"><link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero · Gestión de tareas en equipo</title>
<style>
  :root{
    --bg:#f5f6f8; --panel:#ffffff; --ink:#1c2430; --muted:#6b7787; --line:#e6e9ee;
    --col-bg:#eef0f3; --card-bg:#ffffff; --th-bg:#fafbfc; --hover:#fafbfe; --chip-bg:#f1f3f6; --input-bg:#ffffff;
    --brand:#4f46e5; --brand-soft:#4f46e522;
    --p-urgente:#dc2626; --p-alta:#ea580c; --p-media:#0ea5e9; --p-baja:#64748b;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.1);
    --shadow-lg:0 10px 30px rgba(16,24,40,.18);
    --radius:12px;
  }
  html[data-theme="dark"]{
    --bg:#0f141b; --panel:#161d27; --ink:#e7ebf1; --muted:#8a96a6; --line:#27313d;
    --col-bg:#131a23; --card-bg:#1b232e; --th-bg:#151c25; --hover:#1f2935; --chip-bg:#222d3a; --input-bg:#131a23;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.4);
    --shadow-lg:0 12px 34px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
  button{font-family:inherit;cursor:pointer}
  header.top{background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .top-inner{max-width:1320px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:12px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.02em;font-size:17px}
  .logo .mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--brand),color-mix(in srgb,var(--brand) 55%,#ffffff));display:grid;place-items:center;color:#fff;font-size:15px}
  .ws-pill{margin-left:2px;background:var(--brand-soft);color:var(--brand);border:1px solid var(--brand-soft);padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .backlink{color:var(--muted);text-decoration:none;font-size:12.5px;font-weight:600;padding:7px 9px;border-radius:8px;white-space:nowrap}
  .backlink:hover{color:var(--brand);background:var(--hover)}
  .top-spacer{flex:1}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:8px 14px;border-radius:9px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:.12s}
  .btn:hover{background:var(--hover)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.primary:hover{filter:brightness(.93)}
  .btn.sm{padding:6px 10px;font-size:12px}
  .iconbtn{border:1px solid var(--line);background:var(--panel);color:var(--ink);width:36px;height:36px;border-radius:9px;display:grid;place-items:center;font-size:16px}
  .iconbtn:hover{background:var(--hover)}
  .avatars{display:flex}
  .avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:12px;border:2px solid var(--panel);margin-left:-8px;box-shadow:var(--shadow)}
  .subbar{position:sticky;top:56px;z-index:20;background:var(--bg);max-width:1320px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .tabs{display:flex;background:var(--col-bg);border-radius:10px;padding:3px}
  .tab{border:none;background:none;padding:7px 16px;border-radius:8px;font-weight:600;color:var(--muted);font-size:13px}
  .tab.active{background:var(--panel);color:var(--ink);box-shadow:var(--shadow)}
  .filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex:1}
  .search{position:relative}
  .search input{border:1px solid var(--line);border-radius:9px;padding:8px 12px 8px 32px;font-size:13px;width:200px;outline:none;background:var(--input-bg);color:var(--ink)}
  .search input:focus{border-color:var(--brand)}
  .search svg{position:absolute;left:9px;top:9px;color:var(--muted)}
  select.flt{border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13px;background:var(--input-bg);color:var(--ink);outline:none}
  select.flt:focus{border-color:var(--brand)}
  .clearflt{font-size:12px;color:var(--muted);background:none;border:none;text-decoration:underline}
  main{max-width:1320px;margin:0 auto;padding:14px 20px 60px}
  /* quick add */
  .qadd-wrap{max-width:1320px;margin:12px auto 0;padding:0 20px}
  .qadd{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:8px 12px 8px 14px;box-shadow:var(--shadow)}
  .qadd:focus-within{border-color:var(--brand)}
  .qadd input{flex:1;border:none;background:none;outline:none;font-size:14px;color:var(--ink);font-family:inherit}
  .qadd .hint{font-size:11px;color:var(--muted);white-space:nowrap;font-weight:600}
  .qadd-preview{font-size:12.5px;padding:7px 4px 0;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .qadd-preview .pchip{background:var(--col-bg);border-radius:999px;padding:2px 9px;font-weight:600;color:var(--ink)}
  /* layout + board */
  .layout{display:flex;gap:16px;align-items:flex-start}
  .layout .board{flex:1;min-width:0}
  .board{display:grid;grid-template-columns:repeat(var(--ncols,4),1fr);gap:14px;align-items:start}
  .col{background:var(--col-bg);border-radius:var(--radius);padding:10px;min-height:120px}
  .col.drag-over{outline:2px dashed var(--brand);outline-offset:-2px}
  .col-head{display:flex;align-items:center;gap:8px;padding:4px 6px 10px;font-weight:700;font-size:13px}
  .dot{width:9px;height:9px;border-radius:50%}
  .col-count{margin-left:auto;background:var(--panel);color:var(--muted);border-radius:999px;padding:1px 8px;font-size:12px;font-weight:700}
  .col-body{display:flex;flex-direction:column}
  .card{position:relative;background:var(--card-bg);border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;border:1px solid var(--line);border-left:3px solid transparent}
  .card.dragging{opacity:.4}
  .card.ov{border-left-color:var(--p-urgente)}
  .card.td{border-left-color:var(--p-alta)}
  .card.done{opacity:.55}
  .card h4{margin:0 0 4px;font-size:13.5px;font-weight:650;line-height:1.35;padding-right:64px}
  .card.done h4{text-decoration:line-through;text-decoration-color:var(--muted)}
  .card .desc{font-size:12px;color:var(--muted);line-height:1.4;margin:0 0 6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:.12s}
  .card:hover .card-actions{opacity:1}
  .ca-btn{border:1px solid var(--line);background:var(--panel);color:var(--muted);font-size:12px;line-height:1;width:24px;height:24px;border-radius:6px;display:grid;place-items:center}
  .ca-btn:hover{color:var(--brand);border-color:var(--brand)}
  .ca-btn.done:hover{color:var(--s-comp,#16a34a);border-color:#16a34a}
  .ca-btn.del:hover{color:var(--p-urgente);border-color:var(--p-urgente)}
  .card .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px}
  .chip{font-size:11px;font-weight:650;padding:2px 8px;border-radius:999px;display:inline-flex;align-items:center;gap:4px}
  .pchip-proj{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:999px;color:#fff}
  .due{font-size:11.5px;font-weight:600;color:var(--muted);display:inline-flex;align-items:center;gap:4px}
  .due.overdue{color:var(--p-urgente)}
  .due.soon{color:var(--p-alta)}
  .card .foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
  .mini-av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:11px;flex:none}
  .prog{flex:1;margin:0 10px;height:5px;background:var(--col-bg);border-radius:999px;overflow:hidden}
  .prog > i{display:block;height:100%;background:var(--brand)}
  .tag{font-size:10.5px;color:var(--muted);background:var(--chip-bg);border-radius:6px;padding:1px 6px;margin-right:4px}
  .add-card{width:100%;border:1px dashed var(--line);background:none;color:var(--muted);padding:8px;border-radius:9px;font-weight:600;font-size:12.5px}
  .add-card:hover{background:var(--panel);color:var(--brand);border-color:var(--brand)}
  /* tabla */
  table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);cursor:pointer;user-select:none;background:var(--th-bg)}
  th:hover{color:var(--ink)}
  tbody tr:hover{background:var(--hover);cursor:pointer}
  td .resp{display:flex;align-items:center;gap:7px}
  .badge{font-size:11px;font-weight:650;padding:2px 9px;border-radius:999px}
  /* lista (tabla = tarjetas horizontales) */
  .tlist{display:flex;flex-direction:column;gap:10px}
  .lcard{position:relative;display:flex;align-items:center;gap:14px;background:var(--card-bg);border:1px solid var(--line);border-left:3px solid transparent;border-radius:10px;padding:12px 14px;box-shadow:var(--shadow);cursor:pointer;transition:.12s}
  .lcard:hover{border-color:var(--brand)}
  .lcard.ov{border-left-color:var(--p-urgente)}
  .lcard.td{border-left-color:var(--p-alta)}
  .lcard.done{opacity:.55}
  .lcard.done .lc-title{text-decoration:line-through;text-decoration-color:var(--muted)}
  .lc-left{flex:1.3;min-width:0}
  .lc-mid{flex:1.5;min-width:0;color:var(--muted);font-size:12.5px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .lc-mid .lcm-empty{opacity:.45}
  .lc-top{display:flex;align-items:center;gap:8px;min-width:0}
  .lc-title{font-size:14px;font-weight:650;line-height:1.3;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lc-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px}
  .lc-right{display:flex;align-items:center;gap:14px;flex:none}
  .lc-resp{display:flex;align-items:center;gap:8px;width:185px;min-width:0}
  .lc-resp .nm{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .avstack{display:flex;flex:none}
  .avstack .mini-av{margin-left:-8px;border:2px solid var(--card-bg)}
  .avstack .mini-av:first-child{margin-left:0}
  .mini-av.more{background:var(--chip-bg);color:var(--muted)}
  .lc-prog{width:88px;flex:none}
  .lc-prog .prog{margin:0}
  .lc-prog .pl{font-size:11px;color:var(--muted);font-weight:600;text-align:right;display:block;margin-top:3px}
  .lc-actions{display:flex;gap:4px;opacity:0;transition:.12s}
  .lcard:hover .lc-actions{opacity:1}
  .rsel{display:flex;flex-wrap:wrap;gap:6px}
  .rchip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:3px 11px 3px 4px;font-size:12.5px;font-weight:600;cursor:pointer;background:var(--input-bg);color:var(--ink)}
  .rchip .mini-av{width:20px;height:20px;font-size:10px}
  .rchip.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}
  @media(max-width:760px){.lcard{flex-wrap:wrap}.lc-mid{flex-basis:100%;order:3}.lc-right{width:100%;justify-content:space-between}.lc-resp{width:auto;flex:1}}
  /* carga */
  .cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .stat{background:var(--panel);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
  .stat .n{font-size:26px;font-weight:800;letter-spacing:-.02em}
  .stat .l{color:var(--muted);font-size:12.5px;font-weight:600;margin-top:2px}
  .workload{background:var(--panel);border-radius:var(--radius);padding:6px 18px 14px;box-shadow:var(--shadow)}
  .wl-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--line)}
  .wl-row:last-child{border-bottom:none}
  .wl-person{display:flex;align-items:center;gap:9px;width:200px;font-weight:600}
  .wl-bar{flex:1;display:flex;height:24px;border-radius:7px;overflow:hidden;background:var(--col-bg)}
  .wl-seg{height:100%}
  .wl-total{width:130px;text-align:right;color:var(--muted);font-size:12.5px;font-weight:600}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:4px 0 0;padding:12px 0 4px}
  .legend span{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-weight:600}
  /* agenda lateral */
  .agenda{width:330px;flex:none;position:sticky;top:120px;max-height:calc(100vh - 136px);overflow-y:auto;display:flex;flex-direction:column;gap:14px}
  .ag-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}
  .ag-today{background:linear-gradient(135deg,var(--brand),color-mix(in srgb,var(--brand) 62%,#000));color:#fff;border:none}
  .ag-title-h{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:flex;align-items:center;gap:7px;margin-bottom:10px}
  .ag-today .ag-title-h{color:rgba(255,255,255,.72)}
  .ag-overdue .ag-title-h{color:var(--p-urgente)}
  .ag-count{margin-left:auto;font-weight:800}
  .ag-item{display:flex;align-items:flex-start;gap:9px;padding:8px;border-radius:8px;cursor:pointer;transition:.1s}
  .ag-item:hover{background:var(--hover)}
  .ag-today .ag-item{background:rgba(255,255,255,.09);margin-bottom:5px}
  .ag-today .ag-item:hover{background:rgba(255,255,255,.18)}
  .ag-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex:none}
  .ag-info{flex:1;min-width:0}
  .ag-title{font-size:12.5px;font-weight:600;line-height:1.35}
  .ag-meta{font-size:11px;color:var(--muted);margin-top:1px}
  .ag-today .ag-title{color:#fff}.ag-today .ag-meta{color:rgba(255,255,255,.62)}
  .ag-empty{font-size:12px;color:var(--muted);font-style:italic;padding:4px 2px}
  .ag-today .ag-empty{color:rgba(255,255,255,.6)}
  .ag-day{margin-bottom:9px}.ag-day:last-child{margin-bottom:0}
  .ag-day-h{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 3px 2px}
  .ag-day-h .nday{color:var(--ink)}
  .ag-more{font-size:11.5px;font-weight:700;color:var(--brand);cursor:pointer;padding:5px 8px;border-radius:7px;display:inline-block}
  .ag-more:hover{background:var(--hover)}
  .ag-today .ag-more{color:#fff;opacity:.85}.ag-today .ag-more:hover{background:rgba(255,255,255,.14)}
  /* calendario */
  .cal{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .cal-head{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .cal-head h3{margin:0;font-size:15px;text-transform:capitalize}
  .cal-nav{display:flex;gap:6px;margin-left:auto}
  .cal-seg{display:flex;background:var(--col-bg);border-radius:9px;padding:3px}
  .cal-seg button{border:none;background:none;padding:6px 12px;border-radius:7px;font-weight:600;color:var(--muted);font-size:12.5px}
  .cal-seg button.on{background:var(--panel);color:var(--ink);box-shadow:var(--shadow)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-dow{padding:9px 8px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--line);background:var(--th-bg)}
  .cal-cell{min-width:0;overflow:hidden;min-height:98px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:5px 6px;display:flex;flex-direction:column;gap:3px}
  .cal-cell:nth-child(7n){border-right:none}
  .cal-cell.out{background:var(--th-bg)}
  .cal-num{font-size:12px;font-weight:700;color:var(--muted);align-self:flex-end;line-height:1.6}
  .cal-cell.today .cal-num{background:var(--brand);color:#fff;border-radius:50%;width:22px;height:22px;display:grid;place-items:center;line-height:1}
  .cal-task{font-size:11px;font-weight:600;color:#fff;border-radius:5px;padding:2px 6px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cal-more{font-size:10.5px;color:var(--brand);font-weight:700;padding:1px 4px;cursor:pointer;border-radius:4px}
  .cal-more:hover{background:var(--hover)}
  .cal-nofecha{padding:10px 16px;color:var(--muted);font-size:12.5px;border-top:1px solid var(--line)}
  /* calendario semana */
  .cal-week{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-wcell{min-width:0;overflow-y:auto;border-right:1px solid var(--line);padding:8px 7px;min-height:340px;max-height:calc(100vh - 230px);display:flex;flex-direction:column;gap:5px}
  .cal-wcell:last-child{border-right:none}
  .cal-whd{font-size:11px;font-weight:800;color:var(--muted);text-align:center;padding-bottom:6px;text-transform:uppercase;position:sticky;top:0;background:var(--panel)}
  .cal-whd.today{color:var(--brand)}
  .cal-wtask{font-size:11.5px;font-weight:600;color:#fff;border-radius:7px;padding:5px 8px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* calendario año */
  .cal-year{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:14px}
  .cal-mini{cursor:pointer;border:1px solid var(--line);border-radius:10px;padding:9px}
  .cal-mini:hover{border-color:var(--brand)}
  .cal-mini h4{margin:0 0 7px;font-size:12px;text-transform:capitalize;text-align:center}
  .cal-mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cal-mini-d{font-size:9px;text-align:center;padding:2px 0;border-radius:3px;color:var(--muted)}
  .cal-mini-d.has{background:var(--brand);color:#fff;font-weight:700}
  .cal-mini-d.today{outline:1.5px solid var(--p-alta)}
  @media(max-width:760px){.cal-year{grid-template-columns:repeat(2,1fr)}}
  /* modales */
  .overlay{position:fixed;inset:0;background:rgba(16,24,40,.5);backdrop-filter:blur(2px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border-radius:16px;width:100%;max-width:640px;box-shadow:var(--shadow-lg);animation:pop .14s ease}
  @keyframes pop{from{transform:translateY(8px);opacity:.6}to{transform:none;opacity:1}}
  .modal .mhead{display:flex;align-items:center;gap:10px;padding:18px 20px;border-bottom:1px solid var(--line)}
  .modal .mhead .pr-strip{width:4px;height:26px;border-radius:3px}
  .modal h3{margin:0;font-size:16px;flex:1}
  .iclose{border:none;background:var(--chip-bg);width:30px;height:30px;border-radius:8px;font-size:16px;color:var(--muted)}
  .mbody{padding:18px 20px;display:grid;gap:14px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em}
  .field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;font-family:inherit;outline:none;background:var(--input-bg);color:var(--ink)}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--brand)}
  .field textarea{resize:vertical;min-height:64px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .range-row{display:flex;align-items:center;gap:10px}
  .range-row input[type=range]{flex:1;accent-color:var(--brand)}
  .mactions{display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:14px}
  .chk{display:flex;align-items:center;gap:8px;padding:4px 0}
  .chk input[type=checkbox]{width:16px;height:16px;accent-color:var(--brand);flex:none;cursor:pointer}

</style><script id="exo-loading-js">
(function(){
  if(document.getElementById('exo-loading'))return;
  var d=document.createElement('div');
  d.id='exo-loading';
  d.setAttribute('aria-live','polite');
  d.innerHTML='<div class="exo-spin" aria-hidden="true"></div><div class="exo-txt">Cargando…</div>';
  // Insertar al inicio del body en cuanto exista
  function inject(){
    if(!document.body){setTimeout(inject,10);return}
    if(!document.getElementById('exo-loading'))document.body.insertBefore(d,document.body.firstChild);
  }
  inject();
  function hide(){
    var el=document.getElementById('exo-loading');
    if(!el)return;
    el.classList.add('hide');
    setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},350);
  }
  // Páginas pesadas pueden RETENER el overlay hasta estar listas:
  //   window.EXO_LOADING_HOLD=true  (en un <script> del body, antes de DOMContentLoaded)
  //   window.exoLoadingHide()       (cuando la app ya es usable)
  //   window.exoLoadingText('…')    (mensaje propio, p.ej. 'Cargando el liquidador 210…')
  window.exoLoadingHide=hide;
  window.exoLoadingText=function(t){ var x=d.querySelector('.exo-txt'); if(x)x.textContent=t; };
  function autoHide(){ if(!window.EXO_LOADING_HOLD) setTimeout(hide,30); }
  if(document.readyState==='complete'||document.readyState==='interactive'){
    autoHide();
  }else{
    document.addEventListener('DOMContentLoaded',autoHide);
  }
  // Failsafe: nunca atrapar al usuario (4s normal; 12s si la página lo retiene)
  setTimeout(function(){ if(!window.EXO_LOADING_HOLD) hide(); },4000);
  setTimeout(hide,12000);
})();
</script></head>

/* ===== Estado ===== */
let state={view:'board',tasks:[],editingId:null};

/* ===== Persistencia ===== */

/* ===== Orden ===== */
function setSort(s){conf.sort=s;saveConf();render();}
function sortTasks(arr){
  const a=[...arr];const noDue=(x)=>x.due?0:1;
  if(conf.sort==='due')a.sort((x,y)=>noDue(x)-noDue(y)||(x.due>y.due?1:x.due<y.due?-1:0));
  else if(conf.sort==='prio')a.sort((x,y)=>PRIOS[x.prio].rank-PRIOS[y.prio].rank||noDue(x)-noDue(y)||(x.due>y.due?1:-1));
  else if(conf.sort==='recent')a.sort((x,y)=>(y.created||'').localeCompare(x.created||''));

}

/* ===== Calendario ===== */
let calCursor=null,calView='mes',calOpen={};
const MESF=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DOWF=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
function calInit(){if(!calCursor){const n=new Date();calCursor=new Date(n.getFullYear(),n.getMonth(),n.getDate());}}
function setCalView(v){calView=v;conf.calView=v;saveConf();render();}
function calShift(dir){calInit();if(calView==='semana')calCursor.setDate(calCursor.getDate()+7*dir);else if(calView==='anio')calCursor.setFullYear(calCursor.getFullYear()+dir);else calCursor.setMonth(calCursor.getMonth()+dir);render();}
function calToday(){const n=new Date();calCursor=new Date(n.getFullYear(),n.getMonth(),n.getDate());render();}
function calGoMonth(y,m){calCursor=new Date(y,m,1);calView='mes';conf.calView='mes';saveConf();render();}
function toggleCal(iso){calOpen[iso]=!calOpen[iso];render();}
function tasksByDay(list){const o={};list.forEach(t=>{if(t.due)(o[t.due]=o[t.due]||[]).push(t);});return o;}
function isoYMD(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function calChip(t){const pr=PRIOS[t.prio]||PRIOS.media;return `<div class="cal-task" style="background:${pr.color}" onclick="event.stopPropagation();openModal('${t.id}')" title="${esc(t.titulo)}">${esc(t.titulo)}</div>`;}
function renderCalendar(list){
  calInit();
  const byDay=tasksByDay(list),todayISO=isoOf(new Date());
  let title='',body='';
  if(calView==='semana'){
    const c=new Date(calCursor),off=(c.getDay()+6)%7,mon=new Date(c);mon.setDate(c.getDate()-off);const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    title=`${mon.getDate()} ${MES3[mon.getMonth()]} – ${sun.getDate()} ${MES3[sun.getMonth()]} ${sun.getFullYear()}`;
    body=calWeek(byDay,todayISO);
  }else if(calView==='anio'){title=String(calCursor.getFullYear());body=calYear(byDay,todayISO);}
  else{title=MESF[calCursor.getMonth()]+' '+calCursor.getFullYear();body=calMonthGrid(byDay,todayISO);}
  const seg=`<div class="cal-seg"><button class="${calView==='semana'?'on':''}" onclick="setCalView('semana')">Semana</button><button class="${calView==='mes'?'on':''}" onclick="setCalView('mes')">Mes</button><button class="${calView==='anio'?'on':''}" onclick="setCalView('anio')">Año</button></div>`;
  const sinFecha=list.filter(t=>!t.due).length;
  return `<div class="cal"><div class="cal-head">${seg}<h3>${title}</h3>
    <div class="cal-nav"><button class="btn sm" onclick="openCalSync()" title="Sincronizar con Google Calendar">📅 Google Calendar</button><button class="iconbtn" onclick="calShift(-1)">‹</button><button class="btn" onclick="calToday()">Hoy</button><button class="iconbtn" onclick="calShift(1)">›</button></div></div>
    ${body}${sinFecha?`<div class="cal-nofecha">🗓️ ${sinFecha} tarea(s) sin fecha — no aparecen en el calendario.</div>`:''}</div>`;
}
function calMonthGrid(byDay,todayISO){
  const y=calCursor.getFullYear(),m=calCursor.getMonth();
  const start=(new Date(y,m,1).getDay()+6)%7,dim=new Date(y,m+1,0).getDate();let cells='';
  for(let i=0;i<start;i++)cells+='<div class="cal-cell out"></div>';
  for(let d=1;d<=dim;d++){const iso=isoYMD(y,m,d),tasks=byDay[iso]||[],open=calOpen[iso];
    const vis=open?tasks:tasks.slice(0,3);
    const more=tasks.length>3?`<div class="cal-more" onclick="event.stopPropagation();toggleCal('${iso}')">${open?'▲ menos':'+'+(tasks.length-3)+' más'}</div>`:'';
    cells+=`<div class="cal-cell ${iso===todayISO?'today':''}"><span class="cal-num">${d}</span>${vis.map(calChip).join('')}${more}</div>`;}
  const trail=(7-((start+dim)%7))%7;for(let i=0;i<trail;i++)cells+='<div class="cal-cell out"></div>';
  return `<div class="cal-grid">${DOWF.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div>`;
}
function calWeek(byDay,todayISO){
  const c=new Date(calCursor),off=(c.getDay()+6)%7,mon=new Date(c);mon.setDate(c.getDate()-off);let cols='';
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);const iso=isoOf(d),tasks=byDay[iso]||[];
    const items=tasks.map(t=>`<div class="cal-wtask" style="background:${(PRIOS[t.prio]||PRIOS.media).color}" onclick="openModal('${t.id}')" title="${esc(t.titulo)}">${esc(t.titulo)}</div>`).join('')||'<div style="font-size:10px;color:var(--muted);text-align:center">—</div>';
    cols+=`<div class="cal-wcell"><div class="cal-whd ${iso===todayISO?'today':''}">${DOWF[i]} ${d.getDate()}</div>${items}</div>`;}
  return `<div class="cal-week">${cols}</div>`;
}
function calYear(byDay,todayISO){
  const y=calCursor.getFullYear();let mini='';
  for(let m=0;m<12;m++){const start=(new Date(y,m,1).getDay()+6)%7,dim=new Date(y,m+1,0).getDate();let cells='';
    for(let i=0;i<start;i++)cells+='<div class="cal-mini-d"></div>';
    for(let d=1;d<=dim;d++){const iso=isoYMD(y,m,d),has=byDay[iso]&&byDay[iso].length;
      cells+=`<div class="cal-mini-d ${has?'has':''} ${iso===todayISO?'today':''}" title="${has?byDay[iso].length+' tarea(s)':''}">${d}</div>`;}
    mini+=`<div class="cal-mini" onclick="calGoMonth(${y},${m})"><h4>${MESF[m]}</h4><div class="cal-mini-grid">${cells}</div></div>`;}
  return `<div class="cal-year">${mini}</div>`;
}
/* ===== Agenda lateral ===== */
const DOW3=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],MES3=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function startOfToday(){const d=new Date();d.setHours(0,0,0,0);return d;}
function isoOf(d){return d.toISOString().slice(0,10);}
function byDue(a,b){return a.due<b.due?-1:a.due>b.due?1:0;}
function dayHdr(d){return DOW3[d.getDay()]+' '+d.getDate()+' '+MES3[d.getMonth()];}
function agItem(t,withDate){const pr=PRIOS[t.prio]||PRIOS.media;
  const meta=withDate?(fmtDate(t.due)+' · '+esc(nameOf(t))):(esc(nameOf(t))+(t.proj?' · '+esc(t.proj):''));
  return `<div class="ag-item" onclick="openModal('${t.id}')"><span class="ag-dot" style="background:${pr.color}"></span>
    <div class="ag-info"><div class="ag-title">${esc(t.titulo)}</div><div class="ag-meta">${meta}</div></div></div>`;}
let agOpen={};
function toggleAg(k){agOpen[k]=!agOpen[k];render();}
function agList(key,items,limit,withDate){const open=agOpen[key],show=open?items:items.slice(0,limit);
  let h=show.map(t=>agItem(t,withDate)).join('');
  if(items.length>limit)h+=`<div class="ag-more" onclick="event.stopPropagation();toggleAg('${key}')">${open?'▲ Ver menos':'+ '+(items.length-limit)+' más'}</div>`;
  return h;}
function renderAgenda(list){
  const today=startOfToday();
  const active=list.filter(t=>t.due&&t.estado!==lastCol());
  const overdue=active.filter(t=>daysTo(t.due)<0).sort(byDue);
  const todayT=active.filter(t=>daysTo(t.due)===0).sort(byDue);
  const week=[];for(let i=1;i<=6;i++){const d=new Date(today);d.setDate(d.getDate()+i);const iso=isoOf(d);const items=active.filter(t=>t.due===iso).sort(byDue);if(items.length)week.push({d,iso,items});}
  const upcoming=active.filter(t=>daysTo(t.due)>6).sort(byDue);
  let h='';
  h+=`<div class="ag-card ag-today"><div class="ag-title-h">Para hoy <span class="ag-count">${todayT.length}</span></div>`;
  h+=todayT.length?agList('hoy',todayT,6):'<div class="ag-empty">Nada vence hoy — buen día para avanzar.</div>';h+='</div>';
  if(overdue.length){h+=`<div class="ag-card ag-overdue"><div class="ag-title-h">⚠ Vencidas <span class="ag-count">${overdue.length}</span></div>`+agList('venc',overdue,6,true)+'</div>';}
  h+=`<div class="ag-card"><div class="ag-title-h">Resto de la semana</div>`;
  h+=week.length?week.map(g=>`<div class="ag-day"><div class="ag-day-h"><span class="nday">${dayHdr(g.d)}</span></div>${agList('w'+g.iso,g.items,4)}</div>`).join(''):'<div class="ag-empty">Sin vencimientos los próximos días.</div>';h+='</div>';
  if(upcoming.length){h+=`<div class="ag-card"><div class="ag-title-h">Próximos vencimientos <span class="ag-count">${upcoming.length}</span></div>`+agList('prox',upcoming,6,true)+'</div>';}
  return h;
}

function recurNext(due,recur){const base=due?new Date(due+'T00:00:00'):startOfToday();const d=new Date(base);
  if(recur==='diaria')d.setDate(d.getDate()+1);else if(recur==='semanal')d.setDate(d.getDate()+7);else if(recur==='mensual')d.setMonth(d.getMonth()+1);return isoOf(d);}
function spawnRecur(t){if(!t.recur||t.recur==='none')return;
  const clone={...t,id:id(),estado:firstCol(),prog:0,created:new Date().toISOString(),due:t.due?recurNext(t.due,t.recur):'',comments:[],checklist:(t.checklist||[]).map(c=>({text:c.text,done:false}))};
  state.tasks.unshift(clone);syncTask(clone);}

/* ===== Captura rápida (lenguaje natural) ===== */
function norm(x){return x.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}
function parseQuickDate(s){
  const today=startOfToday(),iso=dt=>dt.toISOString().slice(0,10);let m;
  if(m=s.match(/\bhoy\b/i))return{iso:iso(today),match:m[0]};
  if(m=s.match(/\bpasado\s+ma[ñn]ana\b/i)){const d=new Date(today);d.setDate(d.getDate()+2);return{iso:iso(d),match:m[0]};}
  if(m=s.match(/\bma[ñn]ana\b/i)){const d=new Date(today);d.setDate(d.getDate()+1);return{iso:iso(d),match:m[0]};}
  if(m=s.match(/\ben\s+(\d{1,2})\s+d[ií]as?\b/i)){const d=new Date(today);d.setDate(d.getDate()+ +m[1]);return{iso:iso(d),match:m[0]};}
  const dias=['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
  if(m=s.match(/\b(lunes|martes|mi[eé]rcoles|jueves|viernes|s[áa]bado|domingo)\b/i)){const t=dias.indexOf(norm(m[1]));const d=new Date(today);let add=(t-d.getDay()+7)%7;if(add===0)add=7;d.setDate(d.getDate()+add);return{iso:iso(d),match:m[0]};}
  if(m=s.match(/\b(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?\b/)){let dd=+m[1],mm=+m[2],yy=m[3]?(+m[3]<100?2000+ +m[3]:+m[3]):today.getFullYear();const d=new Date(yy,mm-1,dd);if(!isNaN(d.getTime()))return{iso:iso(d),match:m[0]};}
  return null;
}
function parseQuick(raw){
  let s=' '+raw.trim()+' ';const out={prio:null,proj:null,resps:[],due:null};
  const pm=s.match(/\s(?:!(urgente|alta|media|baja)|\b(p[1-4])\b)/i);
  if(pm){const w=(pm[1]||pm[2]).toLowerCase(),map={p1:'urgente',p2:'alta',p3:'media',p4:'baja'};out.prio=map[w]||w;s=s.replace(pm[0],' ');}
  const jm=s.match(/\s#(\S+)/);if(jm){out.proj=jm[1];s=s.replace(jm[0],' ');}
  let am;const re=/\s@(\S+)/g;while(am=re.exec(s)){const q=norm(am[1]);const mm=TEAM.find(u=>norm(u.nombre).split(' ')[0]===q||norm(u.nombre).startsWith(q));if(mm&&!out.resps.includes(mm.id))out.resps.push(mm.id);}
  s=s.replace(/\s@\S+/g,' ');
  const dr=parseQuickDate(s);if(dr){out.due=dr.iso;s=s.replace(dr.match,' ');}
  s=s.replace(/\s\d{1,2}:\d{2}\b/g,' ').replace(/\s\d{1,2}\s?(am|pm)\b/ig,' ');
  out.titulo=s.replace(/\s+/g,' ').trim();return out;
}
function quickAdd(){
  const inp=document.getElementById('qadd'),raw=inp.value.trim();if(!raw)return;
  const p=parseQuick(raw);if(!p.titulo)return;
  const resps=p.resps.length?p.resps:[meId()];
  const nt={id:id(),titulo:p.titulo,desc:'',resps,resp:resps[0],estado:firstCol(),prio:p.prio||'media',proj:p.proj||'',due:p.due||'',prog:0,tags:[],comments:[],checklist:[],recur:'none',created:new Date().toISOString()};
  state.tasks.unshift(nt);
  refreshProjects();saveTasks();syncTask(nt);inp.value='';qaddPreview();fillProjects();render();
}
function qaddPreview(){
  const raw=document.getElementById('qadd').value.trim(),el=document.getElementById('qaddPrev');
  if(!raw){el.innerHTML='';return;}
  const p=parseQuick(raw),chips=[];
  if(p.prio)chips.push(`<span class="pchip" style="color:${PRIOS[p.prio].color}">⚑ ${PRIOS[p.prio].label}</span>`);
  if(p.due)chips.push(`<span class="pchip">🗓 ${dueLabel(p.due,'')}</span>`);
  p.resps.forEach(r=>chips.push(`<span class="pchip">👤 ${esc(member(r).nombre)}</span>`));
  if(p.proj)chips.push(`<span class="pchip">📁 ${esc(p.proj)}</span>`);
  el.innerHTML=chips.length?`<span style="color:var(--muted)">${esc(p.titulo)||'(escribe un título)'}</span> `+chips.join(''):'';
}

function mailtoFor(t){const ids=respIds(t),emails=ids.map(i=>member(i).email).filter(Boolean);
  if(!emails.length){alert('Agrega el correo de los responsables en Configuración (⚙️) para poder notificar.');return null;}
  const nombres=ids.map(i=>member(i).nombre).join(', ');
  const lines=['Hola '+nombres+',','','Tienen una tarea asignada:','• '+t.titulo];
  if(t.due)lines.push('• Vence: '+t.due);if(t.prio)lines.push('• Prioridad: '+PRIOS[t.prio].label);
  if(t.desc)lines.push('','Detalle:',t.desc);
  return 'mailto:'+encodeURIComponent(emails.join(','))+'?subject='+encodeURIComponent('Tarea: '+t.titulo)+'&body='+encodeURIComponent(lines.join('\n'));}

    recur:val('mRecur'),checklist:chkTemp.slice(),
    prog:+document.getElementById('mProg').value,tags:val('mTags').split(',').map(s=>s.trim()).filter(Boolean)};
  const editing=state.editingId?state.tasks.find(x=>x.id===state.editingId):null,prev=editing?editing.estado:null;

  const m=member(mid),fb=TEAM.find(x=>x.id!==mid);
  if(!confirm('¿Quitar a '+m.nombre+'? Sus tareas pasan a '+fb.nombre+'.'))return;
  const changed=[];
  state.tasks.forEach(t=>{if(respIds(t).includes(mid)){let ids=respIds(t).filter(x=>x!==mid);if(!ids.length)ids=[fb.id];t.resps=ids;t.resp=ids[0];changed.push(t);}});
  TEAM=TEAM.filter(x=>x.id!==mid);
  saveTeam();saveTasks();fillSelects();renderCfg();render();
  if(connected()){syncMeta({members:TEAM});changed.forEach(syncTask);}}
function addProject(){const n=val('cfgProjName');if(!n)return;if(PROJECTS.some(p=>p.nombre===n)){alert('Ese proyecto ya existe.');return;}
  PROJECTS.push({nombre:n,color:PALETTE[PROJECTS.length%PALETTE.length]});saveProjects();fillProjects();renderCfg();if(connected())syncMeta();}
function delProject(enc){const n=decodeURIComponent(enc);if(!confirm('¿Quitar el proyecto "'+n+'"? Las tareas conservan el texto.'))return;
  PROJECTS=PROJECTS.filter(p=>p.nombre!==n);saveProjects();fillProjects();renderCfg();render();if(connected())syncMeta();}
/* ===== Exportar / respaldo ===== */
function download(name,href){const a=document.createElement('a');a.href=href;a.download=name;document.body.appendChild(a);a.click();a.remove();}
function exportCSV(){
  const rows=[['Tarea','Descripción','Responsable','Estado','Prioridad','Proyecto','Vence','Avance','Subtareas','Etiquetas']];
  filtered().forEach(t=>rows.push([t.titulo,t.desc||'',member(t.resp).nombre,colMeta(t.estado).label,PRIOS[t.prio].label,t.proj||'',t.due||'',(t.prog||0)+'%',
    (t.checklist||[]).filter(c=>c.done).length+'/'+(t.checklist||[]).length,(t.tags||[]).join(' ')]));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  download('tareas.csv','data:text/csv;charset=utf-8,'+encodeURIComponent('﻿'+csv));
}
function backupJSON(){const data={tasks:state.tasks,team:TEAM,projects:PROJECTS,conf};
  download('tablero-respaldo.json','data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(data,null,2)));}
function triggerImport(){document.getElementById('impFile').click();}
function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);
    if(d.tasks)state.tasks=d.tasks;if(d.team&&d.team.length)TEAM=d.team;if(d.projects)PROJECTS=d.projects;if(d.conf)conf=Object.assign(conf,d.conf);
    COLUMNS=(TEMPLATES[conf.templateId]||TEMPLATES.generico).columns;
    saveTasks();saveTeam();saveProjects();saveConf();applyAppearance();fillSelects();fillProjects();renderCfg();render();alert('Respaldo importado correctamente.');}
    catch(err){alert('Archivo inválido.');}};r.readAsText(f);e.target.value='';}
/* ===== Conexión de equipo (backend) ===== */
const API='https://api.exogenadian.com';
let ws=null,lastRev=0,polling=null;
function connected(){return !!(ws&&ws.code);}
function meId(){return connected()?ws.me.id:TEAM[0].id;}
function meName(){return connected()?ws.me.nombre:TEAM[0].nombre;}
function loadWs(){try{const r=localStorage.getItem('tablero_ws_v1');ws=r?JSON.parse(r):null;}catch(e){ws=null;}}
function saveWs(){if(ws)localStorage.setItem('tablero_ws_v1',JSON.stringify(ws));else localStorage.removeItem('tablero_ws_v1');}
function toast(msg){let el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3200);}
async function api(path,body){const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||('http_'+r.status));return d;}
function syncTask(t){if(!connected())return;api('/api/ws/sync',{code:ws.code,action:'task',task:t}).then(d=>{if(d&&d.rev)lastRev=d.rev;}).catch(e=>toast('Sin sincronizar: '+e.message));}
function syncDelete(tid){if(!connected())return;api('/api/ws/sync',{code:ws.code,action:'delete',taskId:tid}).then(d=>{if(d&&d.rev)lastRev=d.rev;}).catch(()=>{});}
function syncMeta(extra){if(!connected())return;api('/api/ws/sync',Object.assign({code:ws.code,action:'meta',actorEmail:ws.me.email,projects:PROJECTS,columns:COLUMNS,conf},extra||{})).then(d=>{if(d&&d.rev)lastRev=d.rev;}).catch(e=>toast('Cambio no guardado en la nube'));}
function applyServer(d){
  if(d.ws){
    if(Array.isArray(d.ws.members)&&d.ws.members.length){TEAM=d.ws.members;TEAM.forEach((m,i)=>{if(!m.color)m.color=AVCOLORS[i%AVCOLORS.length];});}
    if(Array.isArray(d.ws.columns)&&d.ws.columns.length)COLUMNS=d.ws.columns;
    if(Array.isArray(d.ws.projects))PROJECTS=d.ws.projects;
    if(d.ws.conf&&typeof d.ws.conf==='object')conf=Object.assign(conf,d.ws.conf);
    if(d.ws.name)conf.wsName=d.ws.name;
  }
  if(Array.isArray(d.tasks))state.tasks=d.tasks;
  lastRev=d.rev||0;
  saveTasks();saveTeam();saveProjects();saveConf();applyAppearance();fillSelects();fillProjects();updateConnChip();render();
}
function startPolling(){stopPolling();polling=setInterval(pollWs,25000);}
function stopPolling(){if(polling)clearInterval(polling);polling=null;}
async function pollWs(){if(!connected())return;if(document.getElementById('overlay').classList.contains('show'))return;
  try{const d=await api('/api/ws/get',{code:ws.code});if((d.rev||0)!==lastRev)applyServer(d);}catch(e){}}
function updateConnChip(){const c=document.getElementById('connChip');if(!c)return;
  if(connected()){c.classList.add('on');document.getElementById('connTxt').textContent=(conf.wsName||'Equipo')+' · '+ws.code;}
  else{c.classList.remove('on');document.getElementById('connTxt').textContent='Solo yo';}}
function openConn(){renderConn();document.getElementById('connOverlay').classList.add('show');}
function closeConn(){document.getElementById('connOverlay').classList.remove('show');}
function renderConn(){
  const b=document.getElementById('connBody');
  if(connected()){
    b.innerHTML=`<div class="secttl">Estás en un equipo</div>
      <div class="cfg-note" style="font-size:14px"><b>${esc(conf.wsName||'Equipo')}</b><br>Código para invitar: <span style="font-size:20px;font-weight:800;letter-spacing:2px;color:var(--brand)">${esc(ws.code)}</span><br>
      <span style="font-size:12px">Cualquiera con este código entra al tablero (máx 5 personas). Eres <b>${ws.role==='owner'?'dueño':'miembro'}</b>: ${esc(meName())}.</span></div>
      <div class="cfg-add"><button class="btn" onclick="copyCode()">⧉ Copiar código</button><button class="btn" onclick="disconnectWs()">Salir del equipo aquí</button></div>
      <div class="secttl" style="margin-top:18px">📅 Sincronizar con tu calendario</div>
      <div class="cfg-note" style="font-size:12.5px;margin-bottom:8px">Suscribe este enlace en <b>Google Calendar</b> (⚙ Configuración → Añadir calendario → <b>Desde URL</b>) o en Outlook. Las tareas con fecha aparecen y se actualizan solas. Cada quien puede suscribirlo.</div>
      <div class="cfg-add"><input id="icsUrl" readonly value="${API}/api/ws/ics?code=${esc(ws.code)}" onclick="this.select()"><button class="btn" onclick="copyIcs()">⧉ Copiar enlace</button><button class="btn" onclick="window.open('https://calendar.google.com/calendar/u/0/r/settings/addbyurl','_blank')">Abrir Calendar</button></div>`;
  }else{
    b.innerHTML=`<div class="cfg-note" style="margin-bottom:14px;border:1px solid var(--p-alta);background:var(--input-bg)">⚠ <b>Tus datos están solo en este navegador.</b> Si borras el caché/historial, se pierden. Crea un equipo (se guardan en la nube y los ve todo tu equipo) o descarga un respaldo. <button class="btn sm" onclick="backupJSON()" style="margin-top:8px">💾 Descargar respaldo</button></div>
      <div class="secttl">Crear equipo (requiere PRO)</div>
      <div class="cfg-add"><input id="ccNombre" placeholder="Tu nombre"><input id="ccEmail" type="email" placeholder="Tu correo PRO"></div>
      <div class="cfg-add"><input id="ccWs" placeholder="Nombre del equipo" value="${esc(conf.wsName||'')}"><button class="btn primary" onclick="doCreate()">Crear equipo</button></div>
      <div class="cfg-note" style="margin-bottom:16px">Se sube tu tablero actual y obtienes un código para invitar a tu equipo (ellos entran gratis, sin PRO).</div>
      <div class="secttl">Entrar a un equipo</div>
      <div class="cfg-add"><input id="cjCode" placeholder="Código" style="text-transform:uppercase"><input id="cjNombre" placeholder="Tu nombre"></div>
      <div class="cfg-add"><input id="cjEmail" type="email" placeholder="Tu correo (para recordatorios)"><button class="btn primary" onclick="doJoin()">Entrar</button></div>`;
  }
}
function copyCode(){if(ws&&navigator.clipboard){navigator.clipboard.writeText(ws.code).then(()=>toast('Código copiado'));}}
function copyIcs(){const u=document.getElementById('icsUrl');if(u&&navigator.clipboard){navigator.clipboard.writeText(u.value).then(()=>toast('Enlace de calendario copiado'));}}
function openCalSync(){
  if(connected()){openConn();toast('Copia el enlace y suscríbelo en Google Calendar (Desde URL)');}
  else{downloadLocalICS();}
}
function downloadLocalICS(){
  const pad=n=>String(n).padStart(2,'0');
  const now=(()=>{const d=new Date();return d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+'T'+pad(d.getUTCHours())+pad(d.getUTCMinutes())+pad(d.getUTCSeconds())+'Z';})();
  const plus=iso=>{const d=new Date(iso+'T00:00:00');d.setDate(d.getDate()+1);return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());};
  const ie=s=>String(s==null?'':s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\r?\n/g,'\\n');
  const L=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Tablero//ES','X-WR-CALNAME:'+ie(conf.wsName||'Tablero')];
  let n=0;
  state.tasks.forEach(t=>{if(!t.due||t.estado===lastCol())return;n++;
    L.push('BEGIN:VEVENT','UID:'+ie(t.id)+'@tablero-local','DTSTAMP:'+now,'DTSTART;VALUE=DATE:'+t.due.replace(/-/g,''),'DTEND;VALUE=DATE:'+plus(t.due),'SUMMARY:'+ie(t.titulo));
    const d=[];if(t.desc)d.push(t.desc);if(t.resps||t.resp)d.push('Responsable: '+nameOf(t));if(t.prio)d.push('Prioridad: '+PRIOS[t.prio].label);if(t.proj)d.push('Proyecto: '+t.proj);
    if(d.length)L.push('DESCRIPTION:'+ie(d.join('\\n')));L.push('END:VEVENT');});
  L.push('END:VCALENDAR');
  if(!n){toast('No hay tareas con fecha para exportar');return;}
  download('tablero-calendario.ics','data:text/calendar;charset=utf-8,'+encodeURIComponent(L.join('\r\n')));
  toast('Calendario .ics descargado — impórtalo en Google Calendar (es una foto del momento)');
}
async function doCreate(){
  const email=val('ccEmail'),nombre=val('ccNombre'),name=val('ccWs')||conf.wsName||'Mi equipo';
  if(!email){toast('Pon tu correo PRO');return;}
  const ownerId=(TEAM.find(m=>m.email&&m.email.toLowerCase()===email.toLowerCase())||TEAM[0]).id;
  const ownerMember=TEAM.find(m=>m.id===ownerId)||TEAM[0];if(nombre)ownerMember.nombre=nombre;ownerMember.email=email;
  toast('Creando equipo…');
  try{const d=await api('/api/ws/create',{email,ownerNombre:nombre,ownerId,name,members:TEAM.slice(0,5),projects:PROJECTS,columns:COLUMNS,conf,tasks:state.tasks});
    const om=(d.ws.members||[]).find(m=>m.role==='owner')||{id:ownerId,nombre,email};
    ws={code:d.code,role:'owner',me:om};saveWs();applyServer(d);startPolling();closeConn();
    toast('Equipo creado · código '+d.code);
  }catch(e){toast(e.message==='not_pro'?'Ese correo no es PRO activo':'No se pudo crear: '+e.message);}
}
async function doJoin(){
  const code=val('cjCode').toUpperCase(),nombre=val('cjNombre'),email=val('cjEmail');
  if(!code||!nombre){toast('Código y nombre son obligatorios');return;}
  toast('Entrando…');
  try{const d=await api('/api/ws/join',{code,nombre,email});
    ws={code,role:'member',me:d.member};saveWs();
    const g=await api('/api/ws/get',{code});applyServer(g);startPolling();closeConn();
    toast('Entraste a '+(d.ws.name||'el equipo'));
  }catch(e){toast(e.message==='full'?'El equipo está lleno (máx 5)':e.message==='not_found'?'Código no encontrado':'No se pudo entrar: '+e.message);}
}
function disconnectWs(){if(!confirm('¿Salir del equipo en este dispositivo? El tablero compartido sigue en la nube; aquí volverás a tu copia local.'))return;ws=null;saveWs();stopPolling();toast('Saliste del equipo');location.reload();}
/* ===== Tutorial / ayuda (botón ?) ===== */

/* ===== Init ===== */
function fillSelects(){
  document.getElementById('fResp').innerHTML='<option value="">Todos</option>'+TEAM.map(m=>`<option value="${m.id}">${esc(m.nombre)}</option>`).join('');
  const av=document.getElementById('topAvatars');av.innerHTML='';
  TEAM.slice(0,5).forEach(m=>av.insertAdjacentHTML('beforeend',`<span class="avatar" style="background:${m.color}" title="${esc(m.nombre)}">${initials(m.nombre)}</span>`));
}
function fillProjects(){
  document.getElementById('fProj').innerHTML='<option value="">Proyecto</option>'+PROJECTS.map(p=>`<option value="${esc(p.nombre)}">${esc(p.nombre)}</option>`).join('');
}
document.getElementById('mPrio').addEventListener('change',e=>{document.getElementById('mPrStrip').style.background=PRIOS[e.target.value].color;});
document.getElementById('mProj').addEventListener('change',function(){
  if(this.value==='__new__'){const n=prompt('Nombre del nuevo proyecto:');
