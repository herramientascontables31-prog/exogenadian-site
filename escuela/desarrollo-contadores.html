(function(){
  if(document.getElementById('exo-loading'))return;
  var d=document.createElement('div');
  d.id='exo-loading';
  d.setAttribute('aria-live','polite');
  d.innerHTML='<div class="exo-spin" aria-hidden="true"></div><div class="exo-txt">Cargando…</div>';
  // Insertar al inicio del body en cuanto exista
  function inject(){
    if(!document.body){setTimeout(inject,10);return}
    if(!document.getElementById('exo-loading'))document.body.insertBefore(d,document.body.firstChild);
  }
  inject();
  function hide(){
    var el=document.getElementById('exo-loading');
    if(!el)return;
    el.classList.add('hide');
    setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},350);
  }
  if(document.readyState==='complete'||document.readyState==='interactive'){
    setTimeout(hide,30);
  }else{
    document.addEventListener('DOMContentLoaded',function(){setTimeout(hide,30)});
  }
  // Failsafe: nunca dejar el overlay más de 4s
  setTimeout(hide,4000);
})();

<script>
// ============ COURSE DATA ============
const modules = [
  {
    part: 'Parte 1 — Fundamentos',
    title: '¿Qué es el desarrollo de software?',
    subtitle: 'Empecemos por lo más básico. Desarrollar software es escribir instrucciones que una computadora sigue paso a paso. Nada mágico.',
    content: `
      <h2>Analogía contable</h2>
      <p>Pensá en una <strong>planeación tributaria</strong> que le armás a un cliente. Vos escribís en un documento: "primero revisar UVT vigente, luego identificar si es persona natural o jurídica, después calcular renta presuntiva si aplica, y finalmente liquidar". Ese documento es un <strong>algoritmo</strong> — una secuencia de pasos que, si se siguen en orden, producen un resultado predecible.</p>
      <p>Programar es exactamente eso, pero escrito en un lenguaje que la computadora entiende. En vez de "revisar UVT vigente", un programa dice algo como <code>const uvt = 52374</code>. En vez de "si es persona natural", dice <code>if (tipo === 'natural') { ... }</code>. La lógica es la misma, el idioma es distinto.</p>
      <h2>Por qué existen tantos lenguajes</h2>
      <p>Cada lenguaje está diseñado para un tipo de problema. Excel con sus fórmulas es un "lenguaje" bueno para tablas financieras. Python es bueno para análisis de datos. JavaScript es el lenguaje de los navegadores web. Tu proyecto GenIA usa JavaScript (en su versión moderna llamada <strong>TypeScript</strong>), porque corre en la web.</p>

      <h2>Qué es Git</h2>
      <p>Git es un sistema que lleva un registro <strong>de cada cambio que se hace en el código</strong>. Cada vez que hacés un "commit", Git toma una foto del estado actual del proyecto. Si mañana algo se rompe, podés volver a cualquier foto anterior en segundos.</p>
      <h2>Analogía contable</h2>
      <p>Es como los <strong>asientos de reversión</strong> en contabilidad. Cada movimiento queda registrado con fecha, autor y razón. Si descubrís que un asiento está mal, no lo borrás — hacés uno nuevo que lo reversa. Git funciona igual: cada cambio queda en la historia, nunca se "borra" realmente, solo se agregan movimientos nuevos encima.</p>
      <h2>Conceptos clave</h2>
      <ul>
        <li><strong>Repositorio (repo):</strong> la carpeta completa del proyecto con toda su historia. GenIA es un repositorio.</li>
        <li><strong>Commit:</strong> una foto del estado del proyecto en un momento dado. Cada commit tiene un mensaje que describe qué cambió (ej: "fix: arregla el service worker").</li>
        <li><strong>Rama (branch):</strong> una línea de trabajo paralela. Podés crear una rama para probar algo sin tocar el código principal. Si funciona, lo unís; si no, borrás la rama y listo.</li>
        <li><strong>main (o master):</strong> la rama principal, donde vive el código "bueno" del proyecto.</li>
        <li><strong>merge:</strong> unir una rama con otra. Cuando terminás un fix en una rama aparte, lo hacés merge a main.</li>
        <li><strong>remote:</strong> una copia del repo en un servidor externo, generalmente GitHub. Tu código local y el remoto se sincronizan.</li>
        <li><strong>push:</strong> subir tus commits locales al remoto (GitHub).</li>
        <li><strong>pull:</strong> bajar commits del remoto a tu computadora.</li>
      </ul>
      <h2>Por qué es importante GitHub</h2>
      <p>GitHub es un servicio en la nube que aloja repos de Git. Tres razones para usarlo:</p>

      <div class="code-block"><span class="kw">const</span> empresa = <span class="kw">await</span> prisma.empresa.<span class="fn">findUnique</span>({

    subtitle: 'Un Service Worker es un pequeño programa que corre en el navegador del usuario, separado de la página. Su trabajo es interceptar peticiones, cachear archivos y permitir funcionalidad offline.',
    content: `
      <h2>Service Worker</h2>
      <p>Un Service Worker es un pequeño programa que <strong>corre en el navegador del usuario, separado de la página</strong>. Su trabajo es interceptar las peticiones de red, cachear archivos, permitir funcionalidad offline, y mostrar notificaciones push.</p>
      <h2>Por qué rompió todo hoy</h2>
      <p>El service worker de GenIA tenía un bug: cuando interceptaba una petición y la red fallaba (cosa común en desarrollo por el "Hot Module Reload"), intentaba buscar en caché. Pero la caché estaba vacía, entonces devolvía <code>undefined</code> ("nada") en vez de una respuesta válida. El navegador esperaba algo y recibía "nada" — lo que causaba el "Cargando..." infinito.</p>
      <p>Claude Code lo arregló así: si la red falla y la caché está vacía, devolver una respuesta "vacía pero válida" (status 504). Además, desactivó el registro del service worker en desarrollo, porque en dev no aporta nada y solo rompe.</p>
      <h2>PWA — Progressive Web App</h2>
      <p>Una PWA es una web que se puede "instalar" en el celular o computadora como si fuera una app nativa, con ícono en pantalla de inicio, funciona offline, recibe notificaciones push. El service worker es lo que hace posible la PWA.</p>
      <p>En el futuro, si querés que un contador pueda "instalar" GenIA en su celular como una app, el service worker va a ser clave. Por eso Claude Code no lo eliminó, solo lo desactivó en dev.</p>
    `

    content: `
      <h2>CSP — Content Security Policy</h2>
      <p>Es una medida de seguridad del navegador. Le dice: "en esta página, solo ejecutá código que venga de estos dominios de confianza". Si alguien inyecta código malicioso (ej: un hacker logra meter un <code>&lt;script&gt;</code> malo en tu página), el CSP lo bloquea automáticamente.</p>
      <h2>Analogía contable</h2>
      <p>Es como una <strong>lista blanca de cuentas de terceros autorizadas</strong> en una empresa. Si el tesorero intenta hacer un pago a una cuenta que no está en la lista, el sistema bloquea la transacción automáticamente. CSP hace lo mismo con el código que se ejecuta en la página.</p>
      <h2>Nonce</h2>
      <p>Un nonce ("number used once") es un código aleatorio único que se genera para cada carga de página. El CSP dice: "solo ejecuto scripts que lleven este nonce específico". Así, incluso si un atacante logra inyectar un script, no puede saber el nonce (cambia en cada request) y el navegador lo bloquea.</p>
      <h2>El bug de hoy</h2>
      <p>El warning "Prop nonce did not match. Server: "" Client: "xxx"" aparecía porque el servidor renderizaba la página sin nonce y el cliente esperaba uno. Problema de sincronización. Claude Code lo arregló eliminando el script inline del layout (el que dependía del nonce) y moviéndolo a un archivo externo.</p>
    `

    content: `
      <h2>Por qué importan</h2>
      <p>Tu base de datos evoluciona con el producto. Cuando agregás la funcionalidad de "eventos RADIAN", necesitás una tabla nueva para guardar esos eventos. Esa creación de tabla es una migración.</p>
      <h2>Analogía contable</h2>
      <p>Son los <strong>asientos de apertura y ajuste</strong> del archivador. No cambian los datos existentes, cambian la estructura donde viven los datos. "Agregar una columna para el código CIIU" es una migración. "Rellenar ese código CIIU en empresas existentes" es un data migration (otra cosa, más delicada).</p>
      <h2>Cómo funcionan en Prisma</h2>
      <p>Cada migración queda guardada como un archivo en <code>prisma/migrations/</code>. El nombre del archivo tiene un <strong>timestamp</strong> (fecha + hora) para que se apliquen en el orden correcto. Ejemplo:</p>
      <div class="code-block">prisma/migrations/
├── 20260418100000_radian_cert_eventos/
├── 20260418110000_dian_software_id_pin/
├── 20260418152613_certificados_retencion/
├── 20260418160713_estado_dian_nomina/
└── 20260418162738_dashboard_indices/</div>
      <h2>Comandos clave</h2>
      <div class="code-block"><span class="cmt"># Ver estado de migraciones</span>
npx prisma migrate status
<span class="cmt"># Aplicar migraciones pendientes (PROD)</span>
npx prisma migrate deploy
<span class="cmt"># Regenerar el cliente Prisma después de migrar</span>
npx prisma generate
<span class="cmt"># Crear una migración nueva (en desarrollo)</span>
npx prisma migrate dev --name descripcion-del-cambio</div>
      <div class="callout danger">
        <div class="callout-title">🚨 CRÍTICO: migraciones en prod</div>
        <p>Las migraciones en producción son una operación delicada. Si algo sale mal, podés corromper la base y afectar a clientes reales. Regla: <strong>nunca, nunca</strong> corras <code>migrate dev</code> en prod. Siempre <code>migrate deploy</code>, y siempre después de hacer backup. Claude Code conoce esto, pero no está de más que vos lo sepas.</p>
      </div>
    `

        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Package (paquete):</strong> código empaquetado y publicado para reutilizar.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>PWA</strong> (Progressive Web App): aplicación web que se comporta como app nativa.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Prod (production):</strong> entorno de producción, donde los usuarios reales usan el producto.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Props:</strong> parámetros que un componente React recibe.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Pull:</strong> bajar cambios desde un repositorio remoto.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Push:</strong> subir cambios a un repositorio remoto.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Query:</strong> consulta a una base de datos.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>React:</strong> librería de JavaScript para construir interfaces.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Refactor:</strong> reescribir código sin cambiar su comportamiento, para que sea más limpio.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Repo (repositorio):</strong> carpeta del proyecto con su historia Git.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Request / response:</strong> petición y respuesta. El frontend hace requests, el backend devuelve responses.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>REST:</strong> estilo de diseño de APIs muy común.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Route / Ruta:</strong> una URL dentro de tu aplicación.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Schema:</strong> estructura de una base de datos o de datos JSON.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Script:</strong> archivo de código. También, un comando corto definido en <code>package.json</code>.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Server:</strong> el backend, la parte que corre en el servidor.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Service Worker:</strong> script que corre en segundo plano en el navegador, permite offline y notificaciones.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>SSR</strong> (Server-Side Rendering): renderizar la página en el servidor antes de enviarla al navegador.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Stack:</strong> conjunto de tecnologías que usa un proyecto.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>State / Estado:</strong> datos que un componente React mantiene y pueden cambiar.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Tailwind CSS:</strong> framework de CSS basado en clases utilitarias. GenIA lo usa.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Terminal:</strong> ventana donde escribís comandos. Git Bash en tu caso.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Test:</strong> verificación automática de que el código funciona.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>TypeScript:</strong> JavaScript con tipos. El lenguaje de GenIA.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>UI</strong> (User Interface): interfaz de usuario.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>UX</strong> (User Experience): experiencia de usuario.</li>
        <li style="padding: 12px 0; border-bottom: 1px solid var(--border);"><strong>Variable de entorno:</strong> dato de configuración externo al código, en el archivo <code>.env</code>.</li>
        <li style="padding: 12px 0;"><strong>Webhook:</strong> URL a la que otro sistema envía datos automáticamente cuando pasa algo.</li>
      </ul>
      </div>
    `
  },
  {
    part: 'Parte 6 — Referencia rápida',
    title: 'Cheat sheet de comandos',
    subtitle: 'Los comandos esenciales que vas a usar el 95% del tiempo. Imprimíla y pegala al lado del monitor.',
    content: `

// ============ STATE ============
let currentIndex = 0;
const STORAGE_KEY = 'curso-desarrollo-contadores-v1';
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { lastIndex: 0, completed: [] };
}
function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {}
}
let state = loadState();
// ============ RENDER ============
function renderSidebar() {
  const list = document.getElementById('moduleList');
  list.innerHTML = '';
  let currentPart = '';
  modules.forEach((m, i) => {
    if (m.part !== currentPart) {
      currentPart = m.part;
      const divider = document.createElement('li');
      divider.className = 'part-divider';
      divider.textContent = m.part;
      list.appendChild(divider);
    }
    const li = document.createElement('li');
    li.className = 'module-item';
    if (i === currentIndex) li.classList.add('active');
    if (state.completed.includes(i)) li.classList.add('completed');
    li.innerHTML = `
      <div class="module-number"><span class="num">${i + 1}</span></div>
      <div class="module-title">${m.title}</div>
    `;
    li.onclick = () => goToModule(i);
    list.appendChild(li);
  });
  const pct = Math.round((state.completed.length / modules.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${state.completed.length} de ${modules.length} módulos`;
}
function renderModule() {
  const m = modules[currentIndex];
  const container = document.getElementById('moduleContent');
  container.className = 'fade-in';
  container.innerHTML = `
    <div class="breadcrumb">
      <a href="../escuela.html">Escuela</a> <span>›</span> Desarrollo para Contadores <span>›</span> Módulo ${currentIndex + 1}
    </div>
    <div class="module-pill">Módulo ${currentIndex + 1} de ${modules.length}</div>
    <h1 class="module-title-main">${m.title}</h1>
    <p class="module-subtitle">${m.subtitle}</p>
    <div class="cert-banner">
      <span class="emoji">📘</span>
      <span>Curso gratis · Tu progreso se guarda automáticamente en este navegador</span>
    </div>
    <div class="content-body">${m.content}</div>
  `;
  // force reflow for animation
  void container.offsetWidth;
  // Nav buttons
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  if (currentIndex === 0) {
    prevBtn.disabled = true;
    document.getElementById('prevTitle').textContent = '—';
  } else {
    prevBtn.disabled = false;
    document.getElementById('prevTitle').textContent = modules[currentIndex - 1].title;
  }
  if (currentIndex === modules.length - 1) {
    nextBtn.disabled = true;
    document.getElementById('nextTitle').textContent = '—';
  } else {
    nextBtn.disabled = false;
    document.getElementById('nextTitle').textContent = modules[currentIndex + 1].title;
  }
  // Mark as visited when we spend time
  if (!state.completed.includes(currentIndex)) {
    state.completed.push(currentIndex);
  }
  state.lastIndex = currentIndex;
  saveState(state);
  renderSidebar();
  // Track module view in GA
  if (typeof gtag === 'function') {
    gtag('event', 'curso_desarrollo_modulo_visto', {
      modulo_indice: currentIndex + 1,
      modulo_titulo: m.title
    });
  }
  // scroll top
  window.scrollTo({ top: 0, behavior: 'smooth' });
  // close mobile sidebar
  document.querySelector('.sidebar').classList.remove('open');
}
function goToModule(i) {
  currentIndex = i;
  renderModule();
  hideBanner();
}
function goPrev() {
  if (currentIndex > 0) {
    currentIndex--;
    renderModule();
    hideBanner();
  }
}
function goNext() {
  if (currentIndex < modules.length - 1) {
    currentIndex++;
    renderModule();
    hideBanner();
  }
}
function continueFromLast() {
  goToModule(state.lastIndex);
}
function hideBanner() {
  document.getElementById('continueBanner').classList.add('hidden');
}
// ============ INIT ============
function init() {
  // show continue banner if user has a saved position other than module 1
  if (state.lastIndex > 0) {
    const banner = document.getElementById('continueBanner');
    banner.classList.remove('hidden');
    document.getElementById('lastModuleLabel').textContent = `Módulo ${state.lastIndex + 1}`;
    // start at module 1 visually; user clicks to continue
    currentIndex = 0;
  } else {
    currentIndex = 0;
  }
  renderModule();
}
init();
</script>
